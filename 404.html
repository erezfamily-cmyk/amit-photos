<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עמית | צילום — עמוד לא נמצא</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><circle cx='50' cy='45' r='20' fill='none' stroke='%23c8a96e' stroke-width='6'/><circle cx='50' cy='45' r='8' fill='%23c8a96e'/><rect x='30' y='28' width='40' height='4' rx='2' fill='%23c8a96e'/></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --text: #f0ede8;
      --text-muted: #888;
      --accent: #c8a96e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      opacity: 0.15;
      user-select: none;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-top: -1rem;
      margin-bottom: 1rem;
    }
    p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      max-width: 360px;
    }
    a {
      display: inline-block;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.9rem 2rem;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    .lang-toggle { position: fixed; top: 1rem; right: 1rem; display: flex; align-items: center; gap: 0.25rem; }
    .lang-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.3rem; font-family: inherit; }
    .lang-btn.active { color: #c8a96e; }
    .lang-btn:hover { color: #c8a96e; }
  </style>
  <script src="assets/js/i18n.js"></script>
</head>
<body>
  <div class="lang-toggle">
    <button type="button" class="lang-btn active" data-lang="he" onclick="setLang('he')">HE</button>
    <span>|</span>
    <button type="button" class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <div class="num">404</div>
  <h1 data-i18n="404.title">הדף לא נמצא</h1>
  <p data-i18n="404.p">נראה שהתמונה הזו זזה... חזור לגלריה הראשית.</p>
  <a href="index.html" data-i18n="404.btn">חזרה לבית</a>
</body>
</html>
