<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>פאזל הזזה | עמית ארז — צלם אמנותי</title>
  <meta name="description" content="פתור את הפאזל וגלה תמונת צילום אמנותית של עמית ארז. גלריה דיגיטלית לרכישה." />

  <!-- Open Graph — controls preview when sharing on WhatsApp / Facebook -->
  <meta property="og:title" content="🧩 פאזל הזזה | עמית ארז" />
  <meta property="og:description" content="פתור את הפאזל וזכה ב-20% הנחה על תמונה אמנותית. מאתגר? בוא ננסה!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://amitphotos.com/puzzle/" />
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/1mkj7yjz3I-Y951ZoHVSH_-6v8FjL66ap=w1200" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="he_IL" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="🧩 פאזל הזזה | עמית ארז" />
  <meta name="twitter:description" content="פתור את הפאזל וזכה ב-20% הנחה על תמונה אמנותית" />
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/1mkj7yjz3I-Y951ZoHVSH_-6v8FjL66ap=w1200" />

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --accent: #c8a96e;
      --accent-hover: #e0c080;
      --text: #f0ede8;
      --text-muted: #888;
      --border: #222;
      --radius: 4px;
      --font: 'Heebo', sans-serif;
      --font-display: 'Syne', sans-serif;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      direction: rtl;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ===== SPLASH ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
    }
    #splash-bg {
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    #splash-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.18;
      filter: blur(12px);
      transform: scale(1.05);
    }
    .splash-card {
      position: relative;
      background: rgba(17,17,17,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .splash-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--accent);
      text-decoration: none;
    }
    .splash-tagline {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: -0.25rem;
    }
    .splash-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.5rem 0;
    }
    .splash-emoji { font-size: 2.5rem; }
    .splash-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--text);
    }
    .splash-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
    }
    .splash-start {
      margin-top: 0.5rem;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      width: 100%;
      transition: background var(--transition);
      min-height: 48px;
    }
    .splash-start:hover { background: var(--accent-hover); }
    .splash-note {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ===== NAV ===== */
    nav {
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-share {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      min-height: 36px;
    }
    .nav-share:hover { color: var(--accent); border-color: var(--accent); }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      width: 100%;
      max-width: 420px;
    }

    .puzzle-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #photo-info { text-align: center; }

    #photo-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--accent);
    }

    #photo-category {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .photo-credit {
      font-size: 0.72rem;
      color: var(--border);
      margin-top: 0.2rem;
    }
    .photo-credit a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }
    .photo-credit a:hover { color: var(--accent); }

    /* ===== SIZE BUTTONS ===== */
    .size-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }
    .size-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.82rem;
      padding: 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      min-height: 44px;
    }
    .size-btn:hover { color: var(--accent); border-color: var(--accent); }
    .size-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 700; }

    /* ===== BOARD ===== */
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      background: var(--border);
      border: 3px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: min(92vw, 400px);
      height: min(92vw, 400px);
      user-select: none;
      touch-action: none;
    }

    .tile {
      background-color: var(--bg-card);
      position: relative;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .tile:active { opacity: 0.7; }
    .tile.empty {
      background: var(--bg);
      cursor: default;
    }

    /* ===== STATS ===== */
    #stats {
      display: flex;
      gap: 2rem;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    /* ===== BOTTOM BUTTONS ===== */
    .action-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }
    .action-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.8rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      min-height: 44px;
      padding: 0;
    }
    .action-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ===== WIN MODAL ===== */
    .hidden { display: none !important; }

    #win-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      backdrop-filter: blur(8px);
      overflow-y: auto;
    }

    .win-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      margin: auto;
    }

    .win-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .win-content {
      padding: 1.25rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .win-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--accent);
    }

    .win-subtitle { color: var(--text-muted); font-size: 0.88rem; }
    .win-stats-text { font-size: 0.8rem; color: var(--text-muted); }

    .win-discount {
      background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.05));
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: var(--radius);
      padding: 0.65rem;
      font-size: 0.85rem;
      color: var(--accent);
      line-height: 1.5;
    }
    .win-discount strong { font-size: 0.95rem; }

    .win-actions { display: flex; flex-direction: column; gap: 0.45rem; }

    .win-btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      text-decoration: none;
      text-align: center;
      transition: opacity var(--transition);
      min-height: 48px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .win-btn:hover { opacity: 0.82; }

    .win-btn-primary  { background: var(--accent); color: #0a0a0a; }
    .win-btn-whatsapp { background: #25D366; color: #fff; }
    .win-btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .win-share-row { display: flex; gap: 0.45rem; }
    .win-share-row .win-btn { flex: 1; }

    /* ===== MOBILE ===== */
    @media (max-width: 400px) {
      nav { padding: 0.75rem 1rem; }
      main { padding: 1rem 0.75rem; }
      #game-container { gap: 0.7rem; }
      .splash-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div id="splash-bg"><img id="splash-bg-img" src="" alt=""></div>
    <div class="splash-card">
      <a href="../index.html" class="splash-logo">עמית ארז</a>
      <p class="splash-tagline">צלם אמנותי | גלריה דיגיטלית לרכישה</p>
      <hr class="splash-divider">
      <div class="splash-emoji">🧩</div>
      <div class="splash-title">פאזל הזזה</div>
      <p class="splash-desc">פתור את הפאזל וזכה ב-<strong style="color:var(--accent)">20% הנחה</strong> על רכישת התמונה</p>
      <button type="button" class="splash-start" onclick="hideSplash()">התחל לשחק ←</button>
      <p class="splash-note">3×3 קל · 4×4 מאתגר</p>
    </div>
  </div>

  <nav>
    <a href="../index.html" class="nav-logo">עמית ארז</a>
    <button type="button" class="nav-share" onclick="shareChallenge()">📤 שתף אתגר</button>
  </nav>

  <main>
    <div id="game-container">
      <p class="puzzle-label">🧩 פאזל הזזה</p>
      <div id="photo-info">
        <div id="photo-title"></div>
        <div id="photo-category"></div>
        <p class="photo-credit">צילום: <a href="../index.html">עמית ארז</a> · <a href="../index.html">גלריה לרכישה</a></p>
      </div>
      <div class="size-row">
        <button type="button" class="size-btn active" data-size="3" onclick="setSize(3)">3×3 קל</button>
        <button type="button" class="size-btn" data-size="4" onclick="setSize(4)">4×4 מאתגר</button>
      </div>
      <div id="board"></div>
      <div id="stats">
        <span id="timer">00:00</span>
        <span id="moves">0 מהלכים</span>
      </div>
      <div class="action-row">
        <button type="button" class="action-btn" onclick="init()">🔀 החלף</button>
        <button type="button" class="action-btn" onclick="shareChallenge()">📤 שתף</button>
        <button type="button" class="action-btn" onclick="solveGame()">💡 פתור</button>
      </div>
    </div>
  </main>

  <div id="win-modal" class="hidden">
    <div class="win-box">
      <img id="win-photo-img" class="win-photo" src="" alt="">
      <div class="win-content">
        <div class="win-title">🏆 כל הכבוד!</div>
        <div class="win-subtitle" id="win-photo-name"></div>
        <div class="win-stats-text" id="win-stats-text"></div>
        <div class="win-discount">
          🎁 כמתנה על הפתרון — <strong>20% הנחה</strong> לרכישת התמונה<br>
          <small style="color:var(--text-muted)">בתוקף 24 שעות</small>
        </div>
        <div class="win-actions">
          <a id="win-gallery-btn" href="#" class="win-btn win-btn-primary">📸 לתמונה בגלריה + הנחה</a>
          <div class="win-share-row">
            <a id="win-whatsapp-btn" href="#" target="_blank" class="win-btn win-btn-whatsapp">💬 שתף</a>
            <button type="button" id="win-copy-btn" class="win-btn win-btn-secondary">🔗 העתק</button>
          </div>
          <button type="button" id="win-new-btn" class="win-btn win-btn-secondary">🔄 פאזל חדש</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== STATE =====
    let currentPhoto = null;
    let splashDismissed = false;

    // ===== SPLASH =====
    function hideSplash() {
      splashDismissed = true;
      const el = document.getElementById('splash');
      el.style.transition = 'opacity 0.4s ease';
      el.style.opacity = '0';
      setTimeout(() => el.style.display = 'none', 400);
    }

    // ===== SHARE =====
    function shareChallenge() {
      const url = 'https://amitphotos.com/puzzle/';
      const text = `🧩 נסה לפתור את פאזל הצילום של עמית ארז!\nזכה ב-20% הנחה על תמונה אמנותית: `;
      window.open(`https://wa.me/?text=${encodeURIComponent(text + url)}`, '_blank');
    }

    // ===== PHOTO LOADING =====
    async function loadRandomPhoto() {
      const res = await fetch('../data/photos.json');
      const photos = await res.json();
      currentPhoto = photos[Math.floor(Math.random() * photos.length)];
      document.getElementById('photo-title').textContent = currentPhoto.title;
      document.getElementById('photo-category').textContent = currentPhoto.category;
      // Update splash background
      const bgImg = document.getElementById('splash-bg-img');
      if (bgImg) bgImg.src = currentPhoto.thumbnail;
      return currentPhoto;
    }

    // ===== GAME LOGIC =====
    let SIZE = 3;
    let TOTAL = SIZE * SIZE;

    function setSize(n) {
      SIZE = n;
      TOTAL = SIZE * SIZE;
      document.querySelectorAll('.size-btn').forEach(b =>
        b.classList.toggle('active', +b.dataset.size === n)
      );
      startGame(currentPhoto);
    }

    function solveGame() {
      if (!gameActive) return;
      board = solvedBoard();
      renderBoard(currentPhoto);
      onWin();
    }

    function solvedBoard() {
      return [...Array(TOTAL - 1).keys()].map(i => i + 1).concat(0);
    }

    function emptyIndex(board) {
      return board.indexOf(0);
    }

    function canMove(board, tileIdx) {
      const emptyIdx = emptyIndex(board);
      const tileRow = Math.floor(tileIdx / SIZE);
      const tileCol = tileIdx % SIZE;
      const emptyRow = Math.floor(emptyIdx / SIZE);
      const emptyCol = emptyIdx % SIZE;
      return (tileRow === emptyRow && Math.abs(tileCol - emptyCol) === 1) ||
             (tileCol === emptyCol && Math.abs(tileRow - emptyRow) === 1);
    }

    function moveTile(board, tileIdx) {
      if (!canMove(board, tileIdx)) return null;
      const next = [...board];
      const emptyIdx = emptyIndex(board);
      [next[tileIdx], next[emptyIdx]] = [next[emptyIdx], next[tileIdx]];
      return next;
    }

    function isSolved(board) {
      return board.every((v, i) => v === (i === TOTAL - 1 ? 0 : i + 1));
    }

    function shuffle(board) {
      let b = [...board];
      let lastEmpty = emptyIndex(b);
      for (let i = 0; i < 200; i++) {
        const row = Math.floor(lastEmpty / SIZE);
        const col = lastEmpty % SIZE;
        const neighbors = [];
        if (row > 0)         neighbors.push(lastEmpty - SIZE);
        if (row < SIZE - 1)  neighbors.push(lastEmpty + SIZE);
        if (col > 0)         neighbors.push(lastEmpty - 1);
        if (col < SIZE - 1)  neighbors.push(lastEmpty + 1);
        const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        [b[lastEmpty], b[pick]] = [b[pick], b[lastEmpty]];
        lastEmpty = pick;
      }
      return b;
    }

    // ===== RENDER & STATE =====
    let board = [];
    let moveCount = 0;
    let timerInterval = null;
    let secondsElapsed = 0;
    let gameActive = false;

    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function renderBoard(photo) {
      const boardEl = document.getElementById('board');
      boardEl.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
      boardEl.innerHTML = '';
      board.forEach((value, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile' + (value === 0 ? ' empty' : '');
        tile.dataset.idx = idx;
        if (value !== 0) {
          const solvedIdx = value - 1;
          const solvedRow = Math.floor(solvedIdx / SIZE);
          const solvedCol = solvedIdx % SIZE;
          tile.style.overflow = 'hidden';
          const img = document.createElement('img');
          img.src = photo.thumbnail;
          img.draggable = false;
          img.style.cssText = `position:absolute;width:${SIZE*100}%;height:${SIZE*100}%;top:${-solvedRow*100}%;left:${-solvedCol*100}%;pointer-events:none;user-select:none;`;
          tile.appendChild(img);
        }
        tile.addEventListener('click', () => handleTileClick(idx));
        boardEl.appendChild(tile);
      });
    }

    function handleTileClick(idx) {
      if (!gameActive) return;
      const next = moveTile(board, idx);
      if (!next) return;
      board = next;
      moveCount++;
      document.getElementById('moves').textContent = `${moveCount} מהלכים`;
      renderBoard(currentPhoto);
      if (isSolved(board)) onWin();
    }

    function startGame(photo) {
      board = shuffle(solvedBoard());
      moveCount = 0;
      secondsElapsed = 0;
      gameActive = true;
      document.getElementById('moves').textContent = '0 מהלכים';
      document.getElementById('timer').textContent = '00:00';
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer').textContent = formatTime(secondsElapsed);
      }, 1000);
      renderBoard(photo);
    }

    function onWin() {
      gameActive = false;
      clearInterval(timerInterval);

      const galleryUrl = `../index.html?photo=${currentPhoto.id}&discount=puzzle`;
      const shareUrl   = `https://amitphotos.com/puzzle/`;
      const shareText  = `פתרתי פאזל של "${currentPhoto.title}" באתר עמית ארז! 🧩\nרוצה לנסות? `;

      document.getElementById('win-photo-img').src = currentPhoto.thumbnail;
      document.getElementById('win-photo-img').alt = currentPhoto.title;
      document.getElementById('win-photo-name').textContent = `"${currentPhoto.title}"`;
      document.getElementById('win-stats-text').textContent =
        `${formatTime(secondsElapsed)} · ${moveCount} מהלכים`;
      document.getElementById('win-gallery-btn').href = galleryUrl;
      document.getElementById('win-whatsapp-btn').href =
        `https://wa.me/?text=${encodeURIComponent(shareText + shareUrl)}`;

      document.getElementById('win-copy-btn').onclick = () => {
        navigator.clipboard.writeText(shareUrl).then(() => {
          const btn = document.getElementById('win-copy-btn');
          btn.textContent = '✓ הועתק!';
          setTimeout(() => { btn.textContent = '🔗 העתק'; }, 2000);
        });
      };

      document.getElementById('win-new-btn').onclick = () => {
        document.getElementById('win-modal').classList.add('hidden');
        init();
      };

      document.getElementById('win-modal').classList.remove('hidden');
    }

    // ===== KEYBOARD =====
    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      const emptyIdx = emptyIndex(board);
      const eRow = Math.floor(emptyIdx / SIZE);
      const eCol = emptyIdx % SIZE;
      let tileIdx = -1;
      if (e.key === 'ArrowUp'    && eRow < SIZE - 1) tileIdx = emptyIdx + SIZE;
      if (e.key === 'ArrowDown'  && eRow > 0)        tileIdx = emptyIdx - SIZE;
      if (e.key === 'ArrowLeft'  && eCol < SIZE - 1) tileIdx = emptyIdx + 1;
      if (e.key === 'ArrowRight' && eCol > 0)        tileIdx = emptyIdx - 1;
      if (tileIdx >= 0) { e.preventDefault(); handleTileClick(tileIdx); }
    });

    // ===== SWIPE =====
    let touchStartX = 0, touchStartY = 0;

    document.getElementById('board').addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.getElementById('board').addEventListener('touchend', (e) => {
      if (!gameActive) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const emptyIdx = emptyIndex(board);
      const eRow = Math.floor(emptyIdx / SIZE);
      const eCol = emptyIdx % SIZE;
      let tileIdx = -1;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
        if (dx < 0 && eCol < SIZE - 1) tileIdx = emptyIdx + 1;
        if (dx > 0 && eCol > 0)        tileIdx = emptyIdx - 1;
      } else if (Math.abs(dy) > 30) {
        if (dy < 0 && eRow < SIZE - 1) tileIdx = emptyIdx + SIZE;
        if (dy > 0 && eRow > 0)        tileIdx = emptyIdx - SIZE;
      }
      if (tileIdx >= 0) handleTileClick(tileIdx);
    }, { passive: true });

    async function init() {
      const photo = await loadRandomPhoto();
      startGame(photo);
    }

    init();
  </script>
</body>
</html>
