<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פאזל הזזה | עמית ארז</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --accent: #c8a96e;
      --accent-hover: #e0c080;
      --text: #f0ede8;
      --text-muted: #888;
      --border: #222;
      --radius: 4px;
      --font: 'Heebo', sans-serif;
      --font-display: 'Syne', sans-serif;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      direction: rtl;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }

    .puzzle-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #photo-info { text-align: center; }

    #photo-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--accent);
    }

    #photo-category {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      background: var(--border);
      border: 3px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: min(90vw, 400px);
      height: min(90vw, 400px);
      user-select: none;
      touch-action: none;
    }

    .tile {
      background-color: var(--bg-card);
      background-size: 400% 400%;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .tile:hover { opacity: 0.82; }

    .tile.empty {
      background: var(--bg);
      cursor: default;
    }
    .tile.empty:hover { opacity: 1; }

    #stats {
      display: flex;
      gap: 2rem;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    /* Win modal */
    .hidden { display: none !important; }

    #win-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      backdrop-filter: blur(8px);
    }

    .win-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
    }

    .win-photo {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .win-content {
      padding: 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .win-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--accent);
    }

    .win-subtitle { color: var(--text-muted); font-size: 0.9rem; }
    .win-stats-text { font-size: 0.82rem; color: var(--text-muted); }

    .win-discount {
      background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.05));
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-size: 0.88rem;
      color: var(--accent);
      line-height: 1.5;
    }
    .win-discount strong { font-size: 1rem; }

    .win-actions { display: flex; flex-direction: column; gap: 0.5rem; }

    .win-btn {
      display: block;
      width: 100%;
      padding: 0.72rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      text-decoration: none;
      text-align: center;
      transition: opacity var(--transition);
    }
    .win-btn:hover { opacity: 0.82; }

    .win-btn-primary  { background: var(--accent); color: #0a0a0a; }
    .win-btn-whatsapp { background: #25D366; color: #fff; }
    .win-btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .win-share-row { display: flex; gap: 0.5rem; }
    .win-share-row .win-btn { flex: 1; }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo">עמית ארז</a>
  </nav>
  <main>
    <div id="game-container">
      <p class="puzzle-label">🧩 פאזל הזזה</p>
      <div id="photo-info">
        <div id="photo-title"></div>
        <div id="photo-category"></div>
      </div>
      <div id="board"></div>
      <div id="stats">
        <span id="timer">00:00</span>
        <span id="moves">0 מהלכים</span>
      </div>
    </div>
  </main>

  <div id="win-modal" class="hidden">
    <!-- TASK 6 -->
  </div>

  <script>
    // ===== STATE =====
    let currentPhoto = null;

    // ===== PHOTO LOADING =====
    async function loadRandomPhoto() {
      const res = await fetch('../data/photos.json');
      const photos = await res.json();
      currentPhoto = photos[Math.floor(Math.random() * photos.length)];
      document.getElementById('photo-title').textContent = currentPhoto.title;
      document.getElementById('photo-category').textContent = currentPhoto.category;
      return currentPhoto;
    }
  </script>
</body>
</html>
