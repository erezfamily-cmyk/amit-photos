<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה על הרכישה | עמית תמונות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="assets/js/i18n.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0a;
      color: #f0ede8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; }
    .sub { color: #888; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }
    .dl-btn {
      display: inline-block;
      background: #c8a96e;
      color: #0a0a0a;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2.5rem;
      border-radius: 2px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      margin-bottom: 0.75rem;
    }
    .dl-btn:hover { opacity: 0.85; }
    .dl-btn:disabled { opacity: 0.5; cursor: default; }
    .dl-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .note { color: #555; font-size: 0.8rem; margin-top: 1rem; }
    .back { color: #888; font-size: 0.85rem; margin-top: 1.5rem; display: block; text-decoration: none; }
    .back:hover { color: #c8a96e; }
    .lang-toggle { display: flex; align-items: center; justify-content: flex-end; gap: 0.25rem; margin-bottom: 1.5rem; }
    .lang-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.3rem; font-family: inherit; }
    .lang-btn.active { color: #c8a96e; }
    .lang-btn:hover { color: #c8a96e; }
    .spinner {
      display: inline-block;
      width: 1.2rem; height: 1.2rem;
      border: 2px solid #333;
      border-top-color: #c8a96e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #e05; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-toggle">
      <button type="button" class="lang-btn active" data-lang="he" onclick="setLang('he')">HE</button>
      <span>|</span>
      <button type="button" class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="icon" id="status-icon">⏳</div>
    <h1 id="status-title" data-i18n="dl.verifying.title">מאמת תשלום...</h1>
    <p class="sub" id="status-sub" data-i18n="dl.verifying.sub">אנא המתן, בודק את פרטי התשלום עם PayPal.</p>
    <div id="dl-area" style="display:none">
      <div id="dl-list" class="dl-list"></div>
      <p class="note" data-i18n="dl.expire.note">שמור את הקובץ לאחר ההורדה — לשאלות פנה ב-WhatsApp.</p>
    </div>
    <a href="/" class="back" data-i18n="dl.back">← חזרה לגלריה</a>
  </div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);

      // tx = PDT token שPayPal מוסיף ל-return URL (נדרש לאימות אמיתי)
      const tx = params.get('tx');

      // item_number: מ-URL או localStorage כגיבוי
      let itemNumber = params.get('item_number');
      if (!itemNumber) itemNumber = localStorage.getItem('pending_item_number');
      localStorage.removeItem('pending_item_number');

      if (!tx) {
        showManual();
        return;
      }

      try {
        // שלח רק tx (+ item_number כרמז); השרת מאמת מול PayPal ישירות
        const query = new URLSearchParams({ tx });
        if (itemNumber) query.set('item_number', itemNumber);
        const res = await fetch(`/api/verify-payment?${query.toString()}`);
        const data = await res.json();

        if (data.urls && data.urls.length > 0) {
          showSuccessMulti(data.urls, data.title || 'חבילת תמונות');
        } else if (data.url) {
          showSuccess(data.url, data.title || 'תמונה');
        } else if (res.status === 409) {
          showAlreadyProcessed();
        } else {
          showError(data.error || 'שגיאה באימות התשלום');
        }
      } catch (e) {
        showError('שגיאת חיבור. נסה שוב.');
      }
    }

    function showSuccess(url, title) {
      document.getElementById('status-icon').textContent = '✓';
      document.getElementById('status-title').textContent = t('dl.success.title');
      document.getElementById('status-sub').textContent = t('dl.success.sub', { title });
      const list = document.getElementById('dl-list');
      const btn = document.createElement('a');
      btn.className = 'dl-btn';
      btn.href = url;
      btn.textContent = t('dl.download', { title });
      list.appendChild(btn);
      document.getElementById('dl-area').style.display = 'block';
      setTimeout(() => { btn.click(); }, 800);
    }

    function showSuccessMulti(urls, title) {
      document.getElementById('status-icon').textContent = '✓';
      document.getElementById('status-title').textContent = t('dl.success.title');
      document.getElementById('status-sub').textContent = t('dl.success.multi', { count: urls.length });
      const list = document.getElementById('dl-list');
      urls.forEach((item, i) => {
        const btn = document.createElement('a');
        btn.className = 'dl-btn';
        btn.href = item.url;
        btn.textContent = t('dl.download', { title: item.title || String(i + 1) });
        list.appendChild(btn);
      });
      document.getElementById('dl-area').style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('status-icon').textContent = '✗';
      document.getElementById('status-title').textContent = t('dl.error.title');
      document.getElementById('status-sub').innerHTML = `<span class="error">${msg}</span><br/><br/>${t('dl.error.sub')}`;
    }

    function showAlreadyProcessed() {
      document.getElementById('status-icon').textContent = '⚠️';
      document.getElementById('status-title').textContent = t('dl.already.title');
      document.getElementById('status-sub').innerHTML = t('dl.already.sub');
    }

    function showManual() {
      document.getElementById('status-icon').textContent = '📧';
      document.getElementById('status-title').textContent = t('dl.manual.title');
      document.getElementById('status-sub').textContent = t('dl.manual.sub');
    }

    init();
  </script>
</body>
</html>
