<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה על הרכישה | עמית תמונות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0a;
      color: #f0ede8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; }
    .sub { color: #888; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }
    .dl-btn {
      display: inline-block;
      background: #c8a96e;
      color: #0a0a0a;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2.5rem;
      border-radius: 2px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      margin-bottom: 0.75rem;
    }
    .dl-btn:hover { opacity: 0.85; }
    .dl-btn:disabled { opacity: 0.5; cursor: default; }
    .dl-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .note { color: #555; font-size: 0.8rem; margin-top: 1rem; }
    .back { color: #888; font-size: 0.85rem; margin-top: 1.5rem; display: block; text-decoration: none; }
    .back:hover { color: #c8a96e; }
    .spinner {
      display: inline-block;
      width: 1.2rem; height: 1.2rem;
      border: 2px solid #333;
      border-top-color: #c8a96e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #e05; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="status-icon">⏳</div>
    <h1 id="status-title">מאמת תשלום...</h1>
    <p class="sub" id="status-sub">אנא המתן, בודק את פרטי התשלום עם PayPal.</p>
    <div id="dl-area" style="display:none">
      <div id="dl-list" class="dl-list"></div>
      <p class="note">הקישורים תקפים ל-24 שעות ולשימוש חד-פעמי.</p>
    </div>
    <a href="/" class="back">← חזרה לגלריה</a>
  </div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const tx = params.get('tx');

      // item_number: first try URL param (rm=2), then localStorage (fallback)
      let itemNumber = params.get('item_number');
      if (!itemNumber) {
        itemNumber = localStorage.getItem('pending_item_number');
      }
      // Clear regardless — don't want stale data on next visit
      localStorage.removeItem('pending_item_number');

      if (!tx || !itemNumber) {
        showManual();
        return;
      }

      try {
        const res = await fetch(`/api/verify-payment?tx=${encodeURIComponent(tx)}&item_number=${encodeURIComponent(itemNumber)}`);
        const data = await res.json();

        if (data.urls && data.urls.length > 0) {
          showSuccessMulti(data.urls, data.title || 'חבילת תמונות');
        } else if (data.url) {
          showSuccess(data.url, data.title || 'תמונה');
        } else {
          showError(data.error || 'שגיאה באימות התשלום');
        }
      } catch (e) {
        showError('שגיאת חיבור. נסה שוב.');
      }
    }

    function showSuccess(url, title) {
      document.getElementById('status-icon').textContent = '✓';
      document.getElementById('status-title').textContent = 'תודה על הרכישה!';
      document.getElementById('status-sub').textContent = `התשלום אושר. לחץ להורדת "${title}".`;
      const list = document.getElementById('dl-list');
      const btn = document.createElement('a');
      btn.className = 'dl-btn';
      btn.href = url;
      btn.textContent = `הורד: ${title} ↓`;
      list.appendChild(btn);
      document.getElementById('dl-area').style.display = 'block';
      setTimeout(() => { btn.click(); }, 800);
    }

    function showSuccessMulti(urls, title) {
      document.getElementById('status-icon').textContent = '✓';
      document.getElementById('status-title').textContent = 'תודה על הרכישה!';
      document.getElementById('status-sub').textContent = `התשלום אושר. ${urls.length} תמונות מוכנות להורדה.`;
      const list = document.getElementById('dl-list');
      urls.forEach((item, i) => {
        const btn = document.createElement('a');
        btn.className = 'dl-btn';
        btn.href = item.url;
        btn.textContent = `הורד: ${item.title || `תמונה ${i + 1}`} ↓`;
        list.appendChild(btn);
      });
      document.getElementById('dl-area').style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('status-icon').textContent = '✗';
      document.getElementById('status-title').textContent = 'לא ניתן לאמת תשלום';
      document.getElementById('status-sub').innerHTML = `<span class="error">${msg}</span><br/><br/>אם שילמת ולא קיבלת את הקובץ, <a href="mailto:erez.family@gmail.com" style="color:#c8a96e">שלח מייל</a> עם אישור התשלום.`;
    }

    function showManual() {
      document.getElementById('status-icon').textContent = '📧';
      document.getElementById('status-title').textContent = 'תשלום התקבל';
      document.getElementById('status-sub').textContent = 'הקובץ יישלח אליך במייל בקרוב. אם לא קיבלת תוך שעה — צור קשר.';
    }

    init();
  </script>
</body>
</html>
