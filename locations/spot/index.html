<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מקום צילום — Amit Photos</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="עמית ארז | צילום">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111;--border:#222;--accent:#c8a96e;--text:#f0ede8;--muted:#888;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;padding:0 0 4rem}
.spot-hero{padding:2.5rem 1.25rem 1.5rem;max-width:800px;margin:0 auto}
.back-link{font-size:.85rem;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1.5rem;transition:color .2s}
.back-link:hover{color:var(--accent)}
.badge{display:inline-block;font-size:.72rem;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);color:var(--accent);border-radius:20px;padding:.3rem .8rem;margin-bottom:.75rem}
h1{font-family:'Syne',sans-serif;font-size:2rem;color:var(--accent);margin-bottom:.5rem}
.region-time{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem}
.map-wrap{margin:0 auto 2rem;max-width:800px;padding:0 1.25rem}
.map-wrap iframe{width:100%;height:300px;border:0;border-radius:8px}
.section{max-width:800px;margin:0 auto 2rem;padding:0 1.25rem}
.section h2{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--accent);margin-bottom:.75rem}
.tip-box{background:#141414;border:1px solid rgba(200,169,110,.2);border-radius:8px;padding:1.25rem;font-size:.9rem;line-height:1.7;color:var(--text)}
.specs-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.specs-list li{font-size:.9rem;color:var(--muted)}
.specs-list li strong{color:var(--text)}
.guides-row{display:flex;flex-wrap:wrap;gap:.5rem}
.guide-chip{background:#141414;border:1px solid var(--border);border-radius:20px;padding:.35rem .9rem;font-size:.8rem;color:var(--muted);text-decoration:none;transition:all .2s}
.guide-chip:hover{border-color:var(--accent);color:var(--accent)}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(min-width:600px){.gallery-grid{grid-template-columns:repeat(3,1fr)}}
.gallery-item{position:relative;aspect-ratio:3/2;overflow:hidden;border-radius:6px;cursor:pointer}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.gallery-item:hover img{transform:scale(1.04)}
.for-sale-btn{position:absolute;bottom:.5rem;left:.5rem;background:var(--accent);color:#0a0a0a;border:none;border-radius:4px;padding:.3rem .7rem;font-size:.75rem;font-weight:700;cursor:pointer;text-decoration:none}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:3000;display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:88vh;border-radius:4px;object-fit:contain}
.lb-close{position:absolute;top:1rem;left:1rem;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:.5rem}
.suggest-link{text-align:center;padding:1.5rem;color:var(--muted);font-size:.85rem}
.suggest-link button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.85rem;text-decoration:underline;font-family:'Heebo',sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;align-items:center;justify-content:center;padding:1.25rem}
.modal-overlay.open{display:flex}
.modal{background:#111;border:1px solid #333;border-radius:12px;padding:2rem;width:100%;max-width:460px}
.modal h2{font-family:'Syne',sans-serif;color:var(--accent);margin-bottom:1.25rem}
.modal label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.3rem}
.modal input,.modal textarea{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:4px;font-size:.9rem;font-family:'Heebo',sans-serif;direction:rtl;margin-bottom:1rem;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:100px;resize:vertical}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.6rem 1.25rem;border-radius:4px;font-size:.85rem;cursor:pointer}
.btn-submit{background:var(--accent);color:#0a0a0a;border:none;padding:.6rem 1.5rem;border-radius:4px;font-weight:700;font-size:.85rem;cursor:pointer}
.share-row { display:flex; gap:.6rem; flex-wrap:wrap; margin:1rem 0 1.5rem; }
.share-btn { display:flex; align-items:center; gap:.4rem; padding:.45rem .9rem; border-radius:20px; border:none; cursor:pointer; font-size:.8rem; font-family:'Heebo',sans-serif; font-weight:600; transition:opacity .2s; }
.share-btn:hover { opacity:.85; }
.share-wa { background:#25D366; color:#fff; }
.share-fb { background:#1877F2; color:#fff; }
.share-copy { background:#222; color:#ccc; border:1px solid #444; }
#waze-wrap { display:none; margin:.75rem 1.25rem; }
#waze-link { display:inline-flex; align-items:center; gap:.5rem; background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:.55rem 1rem; color:#c8a96e; text-decoration:none; font-size:.85rem; font-weight:600; }
#next-loc-nav { display:none; margin:2.5rem 1.25rem; padding:1.25rem 1.5rem; background:#111; border:1px solid #222; border-radius:8px; text-align:center; }
#next-loc-label { font-size:.78rem; color:#666; margin-bottom:.4rem; }
#next-loc-link { color:#c8a96e; text-decoration:none; font-size:1rem; font-weight:700; }
@media print {
  nav#main-nav, footer#main-footer, .share-row, #correction-modal, #correction-trigger { display:none !important; }
  body { background:#fff !important; color:#000 !important; }
}
</style>
</head>
<body>
<script src="/assets/js/nav.js"></script>

<div class="spot-hero" id="spot-hero">
  <a class="back-link" href="/locations/">← חזרה למקומות</a>
  <div id="hero-content"><p style="color:var(--muted)">טוען...</p></div>
  <div class="share-row" id="share-row" style="display:none">
    <button type="button" onclick="shareWhatsApp()" class="share-btn share-wa">WhatsApp</button>
    <button type="button" onclick="shareFacebook()" class="share-btn share-fb">Facebook</button>
    <button type="button" onclick="copyLink()" class="share-btn share-copy" id="btn-copy-link">העתק קישור</button>
    <button type="button" onclick="window.print()" class="share-btn share-copy">🖨 שמור PDF</button>
  </div>
</div>

<div id="map-section"></div>
<div id="waze-wrap">
  <a id="waze-link" href="#" target="_blank" rel="noopener">🧭 נווט ב-Waze</a>
</div>
<div id="details-section"></div>
<div id="gallery-section"></div>

<div id="next-loc-nav">
  <div id="next-loc-label">מקום נוסף באזור זה</div>
  <a id="next-loc-link" href="#"><span id="next-loc-title"></span> ←</a>
</div>

<div class="suggest-link">
  <button id="btn-open-correction">יש לך טיפ או תיקון? שלח לי</button>
</div>

<div class="lb" id="lb">
  <button class="lb-close" id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<div class="modal-overlay" id="correction-modal">
  <div class="modal">
    <h2>שלח תיקון / טיפ</h2>
    <label>שמך (אופציונלי)</label>
    <input type="text" id="corr-name" placeholder="שם">
    <label>הטיפ / התיקון שלך</label>
    <textarea id="corr-message" placeholder="מה תרצה לשתף?"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-corr">ביטול</button>
      <button class="btn-submit" id="btn-send-corr">שלח</button>
    </div>
  </div>
</div>

<script>
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderText(s){
  if(!s) return '';
  return escHtml(s).replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
    (_, text, url) => `<a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline">${text}</a>`);
}

function shareWhatsApp() {
  window.open('https://wa.me/?text=' + encodeURIComponent(document.title + ' ' + location.href));
}
function shareFacebook() {
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href));
}
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('btn-copy-link');
    const orig = btn.textContent;
    btn.textContent = '✓ הועתק!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

async function loadNextLocation(currentSlug, currentRegion) {
  try {
    const res = await fetch('/api/locations');
    const all = await res.json();
    const sameRegion = (Array.isArray(all) ? all : all.locations || [])
      .filter(l => l.region === currentRegion && l.id !== currentSlug);
    if (!sameRegion.length) return;
    const next = sameRegion[0];
    document.getElementById('next-loc-title').textContent = next.title;
    document.getElementById('next-loc-link').href = '/locations/spot/?slug=' + encodeURIComponent(next.id);
    document.getElementById('next-loc-nav').style.display = 'block';
  } catch(e) {}
}

function imgSrc(url, w) {
  if (!url) return '';
  if (url.includes('amitphotos.com/photos/') || url.startsWith('/photos/')) {
    return url + '?w=' + w;
  }
  return url;
}

const GUIDE_LABELS = {
  '/camera/filters/': 'פילטרים',
  '/camera/composition/': 'קומפוזיציה',
  '/camera/exposure/': 'חשיפה',
  '/camera/depth-of-field/': 'עומק שדה',
  '/camera/white-balance/': 'איזון לבן',
  '/camera/histogram/': 'היסטוגרם',
  '/camera/light/': 'אור',
  '/camera/dynamic-range/': 'דינמיק ריינג',
  '/camera/controls/': 'בקרות מצלמה',
  '/camera/lenses/': 'עדשות',
  '/camera/types/': 'סוגי מצלמות'
};

const params = new URLSearchParams(location.search);
const slug = params.get('slug');

if (!slug) { location.href = '/locations/'; }

function setMeta(property, content) {
  let el = document.querySelector(`meta[property="${property}"]`) ||
           document.querySelector(`meta[name="${property}"]`);
  if (!el) {
    el = document.createElement('meta');
    const isOg = property.startsWith('og:') || property.startsWith('twitter:');
    el.setAttribute(isOg ? 'property' : 'name', property);
    document.head.appendChild(el);
  }
  el.setAttribute('content', content);
}

function setLocationMeta(loc, coverUrl) {
  setMeta('og:title', loc.title + ' | מקומות לצילום — עמית ארז');
  setMeta('twitter:title', loc.title + ' | מקומות לצילום');
  const desc = (loc.description || '').slice(0, 160);
  setMeta('og:description', desc);
  setMeta('twitter:description', desc);
  setMeta('description', desc);
  if (coverUrl) {
    setMeta('og:image', coverUrl);
    setMeta('twitter:image', coverUrl);
    setMeta('twitter:card', 'summary_large_image');
  }
  setMeta('og:url', location.href);
  document.title = loc.title + ' | מקומות לצילום — עמית ארז';
}

function setJsonLd(loc) {
  const coords = loc.coordinates ? loc.coordinates.split(',').map(s => s.trim()) : null;
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'TouristAttraction',
    'name': loc.title,
    'description': loc.description || '',
    'url': location.href,
    'address': {
      '@type': 'PostalAddress',
      'addressCountry': 'IL',
      'addressRegion': loc.region || ''
    }
  };
  if (coords && coords.length === 2) {
    ld['geo'] = {
      '@type': 'GeoCoordinates',
      'latitude': coords[0],
      'longitude': coords[1]
    };
  }
  let script = document.getElementById('location-jsonld');
  if (!script) {
    script = document.createElement('script');
    script.id = 'location-jsonld';
    script.type = 'application/ld+json';
    document.head.appendChild(script);
  }
  script.textContent = JSON.stringify(ld);
}

async function loadSpot() {
  try {
    const res = await fetch(`/api/locations/${slug}`);
    if (!res.ok) { location.href = '/locations/'; return; }
    const loc = await res.json();
    renderSpot(loc);
    const coverUrl = (loc.photos && loc.photos.length) ? (loc.photos[0].url || '') : '';
    setLocationMeta(loc, coverUrl);
    setJsonLd(loc);
    loadNextLocation(slug, loc.region);
  } catch {
    document.getElementById('hero-content').innerHTML = '<p style="color:#888">שגיאה בטעינה.</p>';
  }
}

function renderSpot(loc) {
  document.getElementById('hero-content').innerHTML = `
    <div class="badge">📍 ${escHtml(loc.region || 'מקום צילום')}</div>
    <h1>${escHtml(loc.title)}</h1>
    <div class="region-time">${escHtml(loc.region || '')}${loc.best_time ? ' · ' + escHtml(loc.best_time) : ''}</div>
  `;
  document.getElementById('share-row').style.display = 'flex';

  if (loc.coordinates) {
    const parts = loc.coordinates.split(',').map(s => s.trim());
    const [lat, lng] = parts;
    document.getElementById('map-section').innerHTML = `
      <div class="map-wrap">
        <iframe src="https://maps.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lng)}&z=14&output=embed" loading="lazy" allowfullscreen></iframe>
      </div>
    `;
    if (parts.length === 2) {
      document.getElementById('waze-link').href = `https://waze.com/ul?ll=${parts[0]},${parts[1]}&navigate=yes`;
      document.getElementById('waze-wrap').style.display = 'block';
      loadSunTimes(lat, lng);
      loadWeather(lat, lng);
    }
  }

  document.getElementById('details-section').innerHTML = `
    ${loc.description ? `<div class="section"><p style="line-height:1.8;font-size:.95rem">${renderText(loc.description)}</p></div>` : ''}
    ${loc.my_tip ? `<div class="section"><h2>הטיפ שלי</h2><div class="tip-box">${renderText(loc.my_tip)}</div></div>` : ''}
    <div class="section">
      <h2>מפרט צילום</h2>
      <ul class="specs-list">
        ${loc.best_time ? `<li><strong>זמן מומלץ:</strong> ${loc.best_time}</li>` : ''}
        ${loc.equipment ? `<li><strong>ציוד:</strong> ${loc.equipment}</li>` : ''}
        ${loc.coordinates ? `<li><strong>ניווט:</strong> <a href="https://www.google.com/maps/search/?api=1&query=${loc.coordinates}" target="_blank" style="color:var(--accent)">פתח במפות Google</a></li>` : ''}
      </ul>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin:1rem 0">
        <div id="sun-widget" style="display:none;background:#111;border:1px solid #222;border-radius:8px;padding:1rem 1.25rem">
          <div style="font-size:.75rem;color:#666;margin-bottom:.6rem;font-family:'Heebo',sans-serif">זמני צילום היום</div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
            <div>
              <span style="font-size:1.1rem">🌅</span>
              <span style="font-size:.85rem;color:#c8a96e;font-weight:700" id="sun-rise">--:--</span>
              <div style="font-size:.7rem;color:#666">זריחה</div>
            </div>
            <div>
              <span style="font-size:1.1rem">🌇</span>
              <span style="font-size:.85rem;color:#c8a96e;font-weight:700" id="sun-set">--:--</span>
              <div style="font-size:.7rem;color:#666">שקיעה</div>
            </div>
            <div>
              <span style="font-size:1.1rem">✨</span>
              <span style="font-size:.85rem;color:#c8a96e;font-weight:700" id="golden-hour">--:--</span>
              <div style="font-size:.7rem;color:#666">שעת זהב</div>
            </div>
          </div>
        </div>
        <div id="weather-widget" style="display:none;background:#111;border:1px solid #222;border-radius:8px;padding:1rem 1.25rem">
          <div style="font-size:.75rem;color:#666;margin-bottom:.6rem;font-family:'Heebo',sans-serif">מזג אוויר עכשווי</div>
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
            <div style="font-size:2rem" id="weather-icon">—</div>
            <div>
              <div style="font-size:1.4rem;font-weight:700;color:#f0ede8" id="weather-temp">--°</div>
              <div style="font-size:.75rem;color:#888" id="weather-desc">--</div>
            </div>
            <div style="font-size:.8rem;color:#666" id="weather-wind"></div>
          </div>
        </div>
      </div>
    </div>
    ${loc.related_guides && loc.related_guides.length ? `
    <div class="section">
      <h2>מדריכים קשורים</h2>
      <div class="guides-row">
        ${loc.related_guides.map(g => `<a class="guide-chip" href="${g}">${GUIDE_LABELS[g] || g}</a>`).join('')}
      </div>
    </div>` : ''}
  `;

  if (loc.photos && loc.photos.length) {
    document.getElementById('gallery-section').innerHTML = `
      <div class="section">
        <h2>גלריה מהמקום</h2>
        <div class="gallery-grid">
          ${loc.photos.map((p, i) => `
            <div class="gallery-item" data-url="${imgSrc(p.url, 900)}" data-photo-id="${escHtml(p.photo_id||'')}">
              <img src="${imgSrc(p.thumbnail || p.url, 400)}" alt="${escHtml(loc.title)} — תמונה ${i+1}" loading="lazy">
              ${p.for_sale && p.photo_id ? `<a class="for-sale-btn" href="/?photo=${escHtml(p.photo_id)}" target="_blank">לרכישה</a>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', e => {
        if (e.target.classList.contains('for-sale-btn')) return;
        const photoId = item.dataset.photoId;
        if (photoId) {
          window.open('/?photo=' + photoId, '_blank');
        } else {
          document.getElementById('lb-img').src = item.dataset.url;
          document.getElementById('lb').classList.add('open');
        }
      });
    });
  }
}

document.getElementById('lb-close').addEventListener('click', () => document.getElementById('lb').classList.remove('open'));
document.getElementById('lb').addEventListener('click', e => { if (e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); });

document.getElementById('btn-open-correction').addEventListener('click', () => document.getElementById('correction-modal').classList.add('open'));
document.getElementById('btn-cancel-corr').addEventListener('click', () => document.getElementById('correction-modal').classList.remove('open'));
document.getElementById('btn-send-corr').addEventListener('click', async () => {
  const name = document.getElementById('corr-name').value.trim();
  const message = document.getElementById('corr-message').value.trim();
  if (!message) { alert('נא למלא הודעה.'); return; }
  const btn = document.getElementById('btn-send-corr');
  btn.disabled = true; btn.textContent = 'שולח...';
  await fetch('/api/locations/suggest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'correction', location_slug: slug, sender_name: name, message })
  });
  btn.textContent = 'נשלח!';
  setTimeout(() => { document.getElementById('correction-modal').classList.remove('open'); btn.disabled = false; btn.textContent = 'שלח'; }, 1500);
});

const WMO = {
  0:'☀️ בהיר', 1:'🌤 בהיר ברובו', 2:'⛅ מעונן חלקית', 3:'☁️ מעונן',
  45:'🌫 ערפל', 48:'🌫 ערפל קרח',
  51:'🌦 טפטוף קל', 53:'🌦 טפטוף', 55:'🌧 טפטוף כבד',
  61:'🌧 גשם קל', 63:'🌧 גשם', 65:'🌧 גשם כבד',
  71:'🌨 שלג קל', 73:'❄️ שלג', 75:'❄️ שלג כבד',
  80:'🌦 מקלחות קלות', 81:'🌧 מקלחות', 82:'⛈ מקלחות כבדות',
  95:'⛈ סופת רעמים', 99:'⛈ סופה עם ברד'
};

async function loadSunTimes(lat, lng) {
  try {
    const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
    const data = await res.json();
    if (data.status !== 'OK') return;

    function toLocalTime(utcStr) {
      const d = new Date(utcStr);
      return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jerusalem' });
    }

    const sunriseTime = new Date(data.results.sunrise);
    const goldenHour = new Date(sunriseTime.getTime() + 60 * 60 * 1000);

    document.getElementById('sun-rise').textContent = toLocalTime(data.results.sunrise);
    document.getElementById('sun-set').textContent = toLocalTime(data.results.sunset);
    document.getElementById('golden-hour').textContent = toLocalTime(goldenHour.toISOString());
    document.getElementById('sun-widget').style.display = 'block';
  } catch(e) {}
}

async function loadWeather(lat, lng) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weathercode,windspeed_10m&timezone=Asia/Jerusalem`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    if (!c) return;

    const wmoEntry = WMO[c.weathercode] || '🌡 --';
    const [icon, ...descParts] = wmoEntry.split(' ');
    document.getElementById('weather-icon').textContent = icon;
    document.getElementById('weather-temp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-desc').textContent = descParts.join(' ');
    document.getElementById('weather-wind').textContent = `💨 ${Math.round(c.windspeed_10m)} קמ"ש`;
    document.getElementById('weather-widget').style.display = 'block';
  } catch(e) {}
}

loadSpot();
</script>
</body>
</html>
