<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מקומות לצילום — Amit Photos</title>
<meta name="description" content="מקומות מומלצים לצילום בישראל — טיפים, ציוד, שעות מומלצות וגלריה מכל מקום.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111;--border:#222;--accent:#c8a96e;--text:#f0ede8;--muted:#888;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;padding:0 0 4rem}
.page-hero{text-align:center;padding:2.5rem 1.25rem 1.5rem}
.badge{display:inline-block;font-size:.72rem;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);color:var(--accent);border-radius:20px;padding:.3rem .8rem;margin-bottom:.75rem}
.page-hero h1{font-family:'Syne',sans-serif;font-size:2rem;color:var(--accent);margin-bottom:.5rem}
.page-hero p{color:var(--muted);font-size:.9rem;max-width:420px;margin:0 auto 1.25rem}
.btn-suggest{background:var(--accent);color:#0a0a0a;border:none;padding:.65rem 1.5rem;border-radius:4px;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn-suggest:hover{background:#e0c080}
.filters{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:.75rem 1.25rem 1.25rem}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .9rem;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:'Heebo',sans-serif}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr;gap:1.25rem;padding:0 1.25rem;max-width:1100px;margin:0 auto}
@media(min-width:520px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s;display:block}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-img{width:100%;aspect-ratio:3/2;object-fit:cover;background:#1a1a1a;display:block}
.card-body{padding:1rem}
.card-title{font-family:'Syne',sans-serif;font-size:1rem;margin-bottom:.3rem}
.card-meta{font-size:.8rem;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:3rem 1.25rem;font-size:.9rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;align-items:center;justify-content:center;padding:1.25rem}
.modal-overlay.open{display:flex}
.modal{background:#111;border:1px solid #333;border-radius:12px;padding:2rem;width:100%;max-width:460px}
.modal h2{font-family:'Syne',sans-serif;color:var(--accent);margin-bottom:1.25rem}
.modal label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.3rem}
.modal input,.modal textarea,.modal select{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:4px;font-size:.9rem;font-family:'Heebo',sans-serif;direction:rtl;margin-bottom:1rem;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:100px;resize:vertical}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:.5rem}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.6rem 1.25rem;border-radius:4px;font-size:.85rem;cursor:pointer}
.btn-submit{background:var(--accent);color:#0a0a0a;border:none;padding:.6rem 1.5rem;border-radius:4px;font-weight:700;font-size:.85rem;cursor:pointer}
.sort-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:1.5rem;justify-content:flex-end;padding:0 1.25rem;max-width:1100px;margin-left:auto;margin-right:auto}
.sort-bar span{font-size:.8rem;color:#666}
.sort-bar select{background:#111;border:1px solid #333;color:#aaa;padding:.3rem .6rem;border-radius:4px;font-family:'Heebo',sans-serif;font-size:.8rem;cursor:pointer}
.leaflet-popup-content-wrapper{background:#111 !important;color:#f0ede8 !important;border:1px solid #333 !important;border-radius:8px !important}
.leaflet-popup-tip{background:#111 !important}
.leaflet-popup-content{margin:8px 12px !important}
.loc-popup-title{font-weight:700;font-size:.9rem;color:#c8a96e}
.loc-popup-region{font-size:.75rem;color:#888;margin-top:2px}
.loc-popup-link{display:inline-block;margin-top:6px;font-size:.78rem;color:#c8a96e;text-decoration:none}
.map-section{max-width:1100px;margin:0 auto 1.5rem;padding:0 1.25rem}
.btn-toggle-map{background:transparent;border:1px solid #444;color:#aaa;padding:.45rem 1rem;border-radius:20px;font-size:.8rem;font-family:'Heebo',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:.75rem}
.btn-toggle-map:hover{border-color:var(--accent);color:var(--accent)}
.map-container{display:none;border-radius:10px;overflow:hidden;border:1px solid #333;height:380px}
.locations-map{height:100%;width:100%}
</style>
</head>
<body>
<script src="/assets/js/nav.js"></script>

<div class="page-hero">
  <div class="badge">📍 מקומות לצילום</div>
  <h1>מקומות שווים בישראל</h1>
  <p>מדריך צילום לוקיישנים — טיפים, ציוד, שעות מומלצות וגלריה מכל מקום.</p>
  <button class="btn-suggest" id="btn-open-suggest">הצע מקום חדש</button>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-region="">הכל</button>
  <button class="filter-btn" data-region="צפון">צפון</button>
  <button class="filter-btn" data-region="מרכז">מרכז</button>
  <button class="filter-btn" data-region="ירושלים">ירושלים</button>
  <button class="filter-btn" data-region="דרום">דרום</button>
  <button class="filter-btn" data-region="נגב">נגב</button>
  <button class="filter-btn" data-region="הרי אילת">הרי אילת</button>
</div>

<div class="sort-bar">
  <span>מיון:</span>
  <select id="sort-select" title="מיון מקומות" aria-label="מיון מקומות">
    <option value="default">ברירת מחדל</option>
    <option value="alpha">א-ב</option>
    <option value="region">לפי אזור</option>
    <option value="photos">מספר תמונות</option>
  </select>
</div>

<div class="map-section">
  <button type="button" id="btn-toggle-map" class="btn-toggle-map">🗺 הצג מפה</button>
  <div id="map-container" class="map-container">
    <div id="locations-map" class="locations-map"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="suggest-modal">
  <div class="modal">
    <h2>הצע מקום לצילום</h2>
    <label>שמך (אופציונלי)</label>
    <input type="text" id="suggest-name" placeholder="שם">
    <label>שם המקום</label>
    <input type="text" id="suggest-location" placeholder="למשל: נחל נטפים">
    <label>אזור</label>
    <select id="suggest-region">
      <option value="">בחר אזור</option>
      <option>צפון</option><option>מרכז</option><option>ירושלים</option>
      <option>דרום</option><option>נגב</option><option>הרי אילת</option>
    </select>
    <label>תיאור / טיפ</label>
    <textarea id="suggest-message" placeholder="ספר על המקום..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-suggest">ביטול</button>
      <button class="btn-submit" id="btn-send-suggest">שלח</button>
    </div>
  </div>
</div>

<script>
function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getLang() { return localStorage.getItem('lang') || 'he'; }

const REGION_MAP_EN = {
  'צפון': 'North', 'מרכז': 'Center', 'דרום': 'South',
  'ירושלים': 'Jerusalem', 'נגב': 'Negev', 'הרי אילת': 'Eilat Mountains',
  'עמק חפר — שרון': 'Sharon Valley', 'חול — אמירויות': 'UAE',
  'ישראל': 'Israel', 'איטליה': 'Italy', 'יוון': 'Greece', 'צרפת': 'France',
  'ספרד': 'Spain', 'פורטוגל': 'Portugal', 'גרמניה': 'Germany',
  'הולנד': 'Netherlands', 'אנגליה': 'England', 'יפן': 'Japan',
  'תנזניה': 'Tanzania', 'איחוד האמירויות': 'UAE'
};

const LABELS = {
  he: {
    badge: '📍 מקומות לצילום',
    title: 'מקומות לצילום',
    subtitle: 'מקומות מומלצים לצילום בישראל — טיפים, ציוד, שעות מומלצות וגלריה מכל מקום.',
    suggest: 'הצע מקום +',
    empty: 'אין מקומות עדיין.',
    photos: (n) => `${n} תמונות`,
    sortLabel: 'מיון:',
    sortDefault: 'ברירת מחדל',
    sortAlpha: 'א-ב',
    sortRegion: 'לפי אזור',
    sortPhotos: 'מספר תמונות',
    mapShow: '🗺 הצג מפה',
    mapHide: '🗺 הסתר מפה',
    filterAll: 'הכל',
    regionNames: { 'צפון':'צפון','מרכז':'מרכז','ירושלים':'ירושלים','דרום':'דרום','נגב':'נגב','הרי אילת':'הרי אילת' },
    modalTitle: 'הצע מקום לצילום',
    labelName: 'שמך (אופציונלי)',
    placeholderName: 'שם',
    labelPlace: 'שם המקום',
    placeholderPlace: 'למשל: נחל נטפים',
    labelRegion: 'אזור',
    regionPlaceholder: 'בחר אזור',
    labelDesc: 'תיאור / טיפ',
    placeholderDesc: 'ספר על המקום...',
    cancel: 'ביטול',
    send: 'שלח',
    sending: 'שולח...',
    sent: 'נשלח!',
    alertFill: 'נא למלא שם מקום ותיאור.',
    errorLoad: 'שגיאה בטעינת המקומות.',
    viewSpot: 'צפה במקום →',
  },
  en: {
    badge: '📍 Photography Locations',
    title: 'Photography Locations',
    subtitle: 'Recommended photography spots — tips, gear, best times, and a gallery from each location.',
    suggest: 'Suggest a Spot +',
    empty: 'No locations yet.',
    photos: (n) => `${n} photos`,
    sortLabel: 'Sort:',
    sortDefault: 'Default',
    sortAlpha: 'A–Z',
    sortRegion: 'By Region',
    sortPhotos: 'Photo Count',
    mapShow: '🗺 Show Map',
    mapHide: '🗺 Hide Map',
    filterAll: 'All',
    regionNames: { 'צפון':'North','מרכז':'Center','ירושלים':'Jerusalem','דרום':'South','נגב':'Negev','הרי אילת':'Eilat Mountains' },
    modalTitle: 'Suggest a Photography Spot',
    labelName: 'Your name (optional)',
    placeholderName: 'Name',
    labelPlace: 'Location name',
    placeholderPlace: 'e.g. Ein Gedi',
    labelRegion: 'Region',
    regionPlaceholder: 'Choose region',
    labelDesc: 'Description / Tip',
    placeholderDesc: 'Tell us about this spot...',
    cancel: 'Cancel',
    send: 'Send',
    sending: 'Sending...',
    sent: 'Sent!',
    alertFill: 'Please fill in location name and description.',
    errorLoad: 'Error loading locations.',
    viewSpot: 'View spot →',
  }
};

function applyLang() {
  const lang = getLang();
  const L = LABELS[lang] || LABELS.he;
  const isEn = lang === 'en';
  document.documentElement.dir = isEn ? 'ltr' : 'rtl';
  document.documentElement.lang = lang;
  document.body.style.direction = isEn ? 'ltr' : 'rtl';

  const badge = document.querySelector('.badge');
  if (badge) badge.textContent = L.badge;
  const h1 = document.querySelector('.page-hero h1');
  if (h1) h1.textContent = L.title;
  const sub = document.querySelector('.page-hero p');
  if (sub) sub.textContent = L.subtitle;
  const suggestBtn = document.getElementById('btn-open-suggest');
  if (suggestBtn) suggestBtn.textContent = L.suggest;

  // Sort bar
  const sortLabel = document.querySelector('.sort-bar span');
  if (sortLabel) sortLabel.textContent = L.sortLabel;
  const sortSel = document.getElementById('sort-select');
  if (sortSel) {
    const opts = sortSel.options;
    if (opts[0]) opts[0].textContent = L.sortDefault;
    if (opts[1]) opts[1].textContent = L.sortAlpha;
    if (opts[2]) opts[2].textContent = L.sortRegion;
    if (opts[3]) opts[3].textContent = L.sortPhotos;
  }

  // Map toggle
  const mapContainer = document.getElementById('map-container');
  const mapBtn = document.getElementById('btn-toggle-map');
  if (mapBtn) {
    const isOpen = mapContainer && mapContainer.style.display !== 'none';
    mapBtn.textContent = isOpen ? L.mapHide : L.mapShow;
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.region === '') btn.textContent = L.filterAll;
    else if (L.regionNames[btn.dataset.region]) btn.textContent = L.regionNames[btn.dataset.region];
  });

  // Modal
  const modalTitle = document.querySelector('#suggest-modal .modal h2');
  if (modalTitle) modalTitle.textContent = L.modalTitle;
  const labels = document.querySelectorAll('#suggest-modal .modal label');
  if (labels[0]) labels[0].textContent = L.labelName;
  if (labels[1]) labels[1].textContent = L.labelPlace;
  if (labels[2]) labels[2].textContent = L.labelRegion;
  if (labels[3]) labels[3].textContent = L.labelDesc;
  const nameInput = document.getElementById('suggest-name');
  if (nameInput) nameInput.placeholder = L.placeholderName;
  const locInput = document.getElementById('suggest-location');
  if (locInput) locInput.placeholder = L.placeholderPlace;
  const msgInput = document.getElementById('suggest-message');
  if (msgInput) msgInput.placeholder = L.placeholderDesc;
  const regionSel = document.getElementById('suggest-region');
  if (regionSel && regionSel.options[0]) regionSel.options[0].textContent = L.regionPlaceholder;
  const cancelBtn = document.getElementById('btn-cancel-suggest');
  if (cancelBtn) cancelBtn.textContent = L.cancel;
  const sendBtn = document.getElementById('btn-send-suggest');
  if (sendBtn && sendBtn.textContent !== L.sending && sendBtn.textContent !== L.sent)
    sendBtn.textContent = L.send;

  renderGrid();
}

window.addEventListener('storage', (e) => {
  if (e.key === 'lang') applyLang();
});

let allLocations = [];
let activeRegion = '';
let activeSort = 'default';

async function loadLocations() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('/api/locations?t=' + Date.now(), { cache: 'no-store' });
    allLocations = await res.json();
    applyLang();
  } catch {
    const L = LABELS[getLang()] || LABELS.he;
    grid.innerHTML = `<p class="empty">${L.errorLoad}</p>`;
  }
}

function getSorted(arr) {
  const copy = [...arr];
  if (activeSort === 'alpha') {
    copy.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'he'));
  } else if (activeSort === 'region') {
    copy.sort((a, b) => (a.region || '').localeCompare(b.region || '', 'he'));
  } else if (activeSort === 'photos') {
    copy.sort((a, b) => {
      const ac = a.photo_count ?? -1;
      const bc = b.photo_count ?? -1;
      return bc - ac;
    });
  }
  return copy;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = activeRegion
    ? allLocations.filter(l => l.region === activeRegion)
    : allLocations;
  const sorted = getSorted(filtered);

  if (!sorted.length) {
    grid.innerHTML = `<p class="empty">${L.empty}</p>`;
    return;
  }

  const lang = getLang();
  const isEn = lang === 'en';
  const L = LABELS[lang] || LABELS.he;

  grid.innerHTML = sorted.map(l => {
    const displayTitle = (isEn && l.title_en) ? l.title_en : l.title;
    const displayRegion = isEn ? (REGION_MAP_EN[l.region] || l.region || '') : (l.region || '');
    const photoCount = l.photo_count > 0
      ? `<span style="font-size:.68rem;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:1px 7px;color:#888">${L.photos(l.photo_count)}</span>`
      : '';
    return `
    <a class="card" href="/locations/spot/?slug=${escHtml(l.id)}">
      <img class="card-img" src="${escHtml(l.cover_thumb || l.cover_url || '')}" alt="${escHtml(displayTitle)}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-body">
        <div class="card-title">${escHtml(displayTitle)}</div>
        <div class="card-meta" style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          <span>${escHtml(displayRegion)}</span>
          ${photoCount}
        </div>
        ${(l.best_time || l.best_time_en) ? `<div style="font-size:.72rem;color:#888;margin-top:.3rem;display:flex;align-items:center;gap:.25rem"><span style="color:#c8a96e">◷</span><span>${escHtml((isEn && l.best_time_en) ? l.best_time_en : l.best_time)}</span></div>` : ''}
      </div>
    </a>`;
  }).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeRegion = btn.dataset.region;
  renderGrid();
});

document.getElementById('sort-select').addEventListener('change', e => {
  activeSort = e.target.value;
  renderGrid();
});

document.getElementById('btn-open-suggest').addEventListener('click', () => {
  document.getElementById('suggest-modal').classList.add('open');
});
document.getElementById('btn-cancel-suggest').addEventListener('click', () => {
  document.getElementById('suggest-modal').classList.remove('open');
});
document.getElementById('btn-send-suggest').addEventListener('click', async () => {
  const name = document.getElementById('suggest-name').value.trim();
  const location = document.getElementById('suggest-location').value.trim();
  const region = document.getElementById('suggest-region').value;
  const message = document.getElementById('suggest-message').value.trim();

  const L = LABELS[getLang()] || LABELS.he;
  if (!location || !message) { alert(L.alertFill); return; }

  const btn = document.getElementById('btn-send-suggest');
  btn.disabled = true; btn.textContent = L.sending;

  await fetch('/api/locations/suggest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'new', sender_name: name, message: `${location}${region ? ' (' + region + ')' : ''}\n\n${message}` })
  });

  btn.textContent = L.sent;
  setTimeout(() => { document.getElementById('suggest-modal').classList.remove('open'); btn.disabled = false; btn.textContent = L.send; }, 1500);
});

let mapInstance = null;
let mapInitialized = false;

function initMap(locations) {
  if (mapInitialized) {
    mapInstance.eachLayer(l => { if (l instanceof L.CircleMarker) mapInstance.removeLayer(l); });
  } else {
    mapInstance = L.map('locations-map', { zoomControl: true }).setView([31.5, 35.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 18
    }).addTo(mapInstance);
    mapInitialized = true;
  }

  const locs = locations.filter(l => l.coordinates && l.coordinates.includes(','));
  locs.forEach(l => {
    const [lat, lng] = l.coordinates.split(',').map(s => parseFloat(s.trim()));
    if (isNaN(lat) || isNaN(lng)) return;

    const marker = L.circleMarker([lat, lng], {
      radius: 8,
      fillColor: '#c8a96e',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(mapInstance);

    const Lp = LABELS[getLang()] || LABELS.he;
    const isEnP = getLang() === 'en';
    const ptitle = (isEnP && l.title_en) ? l.title_en : l.title;
    const pregion = isEnP ? (REGION_MAP_EN[l.region] || l.region || '') : (l.region || '');
    marker.bindPopup(`
      <div class="loc-popup-title">${escHtml(ptitle)}</div>
      <div class="loc-popup-region">${escHtml(pregion)}</div>
      <a class="loc-popup-link" href="/locations/spot/?slug=${encodeURIComponent(l.id)}">${Lp.viewSpot}</a>
    `);
  });

  if (locs.length > 0) {
    setTimeout(() => mapInstance.invalidateSize(), 100);
  }
}

document.getElementById('btn-toggle-map').addEventListener('click', function() {
  const container = document.getElementById('map-container');
  const L = LABELS[getLang()] || LABELS.he;
  const isOpen = container.style.display !== 'none';
  container.style.display = isOpen ? 'none' : 'block';
  this.textContent = isOpen ? L.mapShow : L.mapHide;
  if (!isOpen) {
    initMap(allLocations);
    setTimeout(() => mapInstance && mapInstance.invalidateSize(), 150);
  }
});

loadLocations();
</script>
</body>
</html>
