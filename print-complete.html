<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אישור הזמנה — עמית פוטוס</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="assets/js/i18n.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { color: #c8a96e; font-size: 1.1rem; letter-spacing: .25em; margin-bottom: 2rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: .75rem; }
    p { color: #888; font-size: .95rem; line-height: 1.7; margin-bottom: 1rem; }
    .order-id { font-size: .8rem; color: #555; margin-top: 1.5rem; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: .7rem 1.8rem;
      background: #c8a96e;
      color: #0a0a0a;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: .9rem;
    }
    .error { color: #e55; }
    #spinner { color: #888; }
    .lang-toggle { display: flex; align-items: center; justify-content: flex-end; gap: 0.25rem; margin-bottom: 1.5rem; }
    .lang-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.3rem; font-family: inherit; }
    .lang-btn.active { color: #c8a96e; }
    .lang-btn:hover { color: #c8a96e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-toggle">
      <button type="button" class="lang-btn active" data-lang="he" onclick="setLang('he')">HE</button>
      <span>|</span>
      <button type="button" class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="logo">AMIT PHOTOS</div>
    <div id="spinner">
      <div class="icon">⏳</div>
      <h1 data-i18n="pc.loading">מאמת תשלום ויוצר הזמנה...</h1>
    </div>
    <div id="success" style="display:none">
      <div class="icon">✅</div>
      <h1 data-i18n="pc.ok.title">ההזמנה התקבלה!</h1>
      <p data-i18n="pc.ok.p1">ההדפסה נשלחה לייצור ותגיע לביתך תוך 7–14 ימי עסקים.</p>
      <p data-i18n="pc.ok.p2">אם הזנת מייל — תקבל עדכון כשהמוצר יישלח.</p>
      <p class="order-id" id="order-id"></p>
      <a href="/" class="btn" data-i18n="pc.ok.back">חזרה לגלריה</a>
    </div>
    <div id="error-state" style="display:none">
      <div class="icon">❌</div>
      <h1 data-i18n="pc.err.title">משהו השתבש</h1>
      <p class="error" id="error-msg"></p>
      <a href="/" class="btn" data-i18n="pc.err.back">חזרה לאתר</a>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const tx = params.get('tx');
      const itemNumber = params.get('item_number');

      if (!tx || !itemNumber || !itemNumber.startsWith('PRINT_')) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('error-msg').textContent = t('pc.err.params');
        return;
      }

      try {
        const r = await fetch('/api/print/order-complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tx, itemNumber })
        });
        const data = await r.json();
        document.getElementById('spinner').style.display = 'none';
        if (r.ok) {
          document.getElementById('success').style.display = 'block';
          if (data.orderId) {
            document.getElementById('order-id').textContent = t('pc.ok.order', { id: data.orderId });
          }
        } else {
          document.getElementById('error-state').style.display = 'block';
          document.getElementById('error-msg').textContent = data.error || t('pc.err.unknown');
        }
      } catch {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        document.getElementById('error-msg').textContent = t('pc.err.net');
      }
    })();
  </script>
</body>
</html>
