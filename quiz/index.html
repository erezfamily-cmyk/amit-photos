<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מאיפה הצילום? — Amit Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #222;
  --accent: #c8a96e;
  --green: #34d399;
  --red: #ef4444;
  --text: #fff;
  --muted: #888;
}
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
}
.site-header {
  width: 100%;
  max-width: 420px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}
.site-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  color: var(--accent);
  text-decoration: none;
}
.game-card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Progress bar */
.progress-bar {
  background: #151515;
  padding: 0.6rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid #1f1f1f;
}
.progress-track { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; }
.progress-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.progress-text  { color: var(--muted); font-size: 0.72rem; white-space: nowrap; }
.score-badge    { color: var(--accent); font-size: 0.72rem; font-weight: 700; white-space: nowrap; }

/* Photo */
.photo-area {
  position: relative;
  height: 210px;
  background: #1a1208;
  overflow: hidden;
}
.photo-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.88; display: block; }
.photo-overlay  { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 45%, var(--surface) 100%); }
.question-label {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.65);
  border: 1px solid #333;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.7rem;
  color: #aaa;
}

/* Photo description (shown after answer) */
.photo-desc {
  padding: 0.6rem 1rem;
  background: #141414;
  border-bottom: 1px solid #1e1e1e;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
  display: none;
}
.photo-desc strong { color: var(--accent); }

/* Answer buttons */
.answers {
  padding: 0.75rem 0.9rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.45rem;
}
.answer-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 0.6rem 0.5rem;
  text-align: right;
  cursor: pointer;
  font-size: 0.82rem;
  color: #ccc;
  font-family: 'Heebo', sans-serif;
  transition: border-color 0.1s, background 0.1s;
}
.answer-btn:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
.answer-btn.correct { background: rgba(52,211,153,0.12); border-color: var(--green); color: var(--green); }
.answer-btn.wrong   { background: rgba(239,68,68,0.1);  border-color: var(--red);   color: var(--red);   }
.answer-btn:disabled { cursor: default; }

/* Feedback */
.feedback {
  margin: 0 0.9rem 0.85rem;
  padding: 0.6rem 0.85rem;
  border-radius: 8px;
  font-size: 0.79rem;
  line-height: 1.5;
  display: none;
}
.feedback.correct { background: rgba(52,211,153,0.09); border: 1px solid rgba(52,211,153,0.28); color: #4ade80; display: block; }
.feedback.wrong   { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.22);  color: #f87171; display: block; }

/* Next button */
.next-btn {
  display: none;
  width: calc(100% - 1.8rem);
  margin: 0 0.9rem 0.9rem;
  padding: 0.65rem;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 700;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
}

/* ===== WIN / LOSE SCREEN ===== */
.result-screen { display: none; }
.win-photo {
  height: 170px; position: relative; overflow: hidden; background: #1a1208;
}
.win-photo img { width:100%;height:100%;object-fit:cover;opacity:0.75;display:block; }
.win-badge {
  position:absolute; top:10px; right:10px;
  background: var(--accent); color:#111;
  font-size:0.7rem; font-weight:700;
  padding:3px 10px; border-radius:20px;
}
.win-photo-overlay { position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--surface) 100%); }
.win-content { padding: 1rem 1rem 1.25rem; text-align: center; }
.win-trophy  { font-size: 2rem; margin-bottom: 0.3rem; }
.win-title   { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; }
.win-sub     { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.9rem; }
.win-score   { display:flex; justify-content:center; gap:0.6rem; margin-bottom:0.9rem; }
.win-dot {
  width:26px;height:26px; border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem; font-weight:700;
}
.win-dot.ok  { background:rgba(52,211,153,0.18); border:1.5px solid var(--green); color:var(--green); }
.win-dot.bad { background:rgba(239,68,68,0.12);  border:1.5px solid var(--red);   color:var(--red);   }
.discount-box {
  background: linear-gradient(135deg,rgba(200,169,110,0.13),rgba(200,169,110,0.04));
  border: 1px solid rgba(200,169,110,0.3);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
  margin-bottom: 0.85rem;
  font-size: 0.83rem;
  color: var(--accent);
  line-height: 1.65;
  text-align: right;
}
.discount-box strong { font-size: 0.95rem; }
.result-btn {
  display: block; width: 100%;
  padding: 0.65rem; border-radius: 8px;
  font-size: 0.86rem; font-weight: 600;
  font-family: 'Heebo', sans-serif;
  border: none; cursor: pointer;
  margin-bottom: 0.45rem;
  text-align: center; text-decoration: none;
}
.btn-gold  { background: var(--accent); color: #111; }
.btn-whatsapp { background: #25D366; color: #fff; }
.btn-dark  { background: #1a1a1a; border: 1px solid #2a2a2a; color: var(--muted); }

/* Loading / error */
#loading, #error-msg {
  padding: 3rem 1rem;
  text-align: center;
  color: var(--muted);
}
</style>
</head>
<body>

<header class="site-header">
  <a class="site-title" href="https://amitphotos.com">Amit Photos</a>
  <span style="color:var(--muted);font-size:0.8rem">🌍 מאיפה הצילום?</span>
</header>

<div class="game-card" id="game-card">
  <div id="loading">טוען תמונות...</div>
  <div id="error-msg" style="display:none">לא הצלחנו לטעון תמונות. <a href="https://amitphotos.com" style="color:var(--accent)">חזרה לגלריה</a></div>

  <!-- Game screen -->
  <div id="game-screen" style="display:none">
    <div class="progress-bar">
      <span class="score-badge" id="score-badge">✓ 0 נכון</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-text" id="progress-text">1 / 5</span>
    </div>

    <div class="photo-area">
      <img id="question-img" src="" alt="">
      <div class="photo-overlay"></div>
      <div class="question-label">🌍 מאיפה הצילום?</div>
    </div>

    <div class="photo-desc" id="photo-desc"></div>

    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">הבא ←</button>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="result-screen">
    <div class="win-photo">
      <img id="result-img" src="" alt="">
      <div class="win-badge" id="result-badge">🌍 סיבוב הושלם!</div>
      <div class="win-photo-overlay"></div>
    </div>
    <div class="win-content">
      <div class="win-trophy" id="result-trophy">🏆</div>
      <div class="win-title" id="result-title">כל הכבוד!</div>
      <div class="win-sub" id="result-sub">ענית נכון על 5 מתוך 5</div>
      <div class="win-score" id="win-score"></div>
      <div class="discount-box" id="discount-box" style="display:none">
        🎁 זכית ב<strong>הנחה 20%</strong> על כל תמונה בגלריה<br>
        <small style="color:#a88040">בתוקף 24 שעות מרגע הניצחון</small>
      </div>
      <a class="result-btn btn-gold" id="btn-gallery" href="https://amitphotos.com/?discount=quiz">🛍️ לגלריה עם ההנחה</a>
      <a class="result-btn btn-whatsapp" id="btn-share" href="#" target="_blank">💬 שתף בוואטסאפ</a>
      <button class="result-btn btn-dark" id="btn-retry">🔄 סיבוב חדש</button>
    </div>
  </div>
</div>

<script>
const SITE_URL   = 'https://amitphotos.com';
const QUIZ_URL   = `${SITE_URL}/quiz/`;
const QUESTIONS  = 5;
const WIN_SCORE  = 3;

const COUNTRIES = [
  "🇮🇱 ישראל", "🇮🇹 איטליה", "🇬🇧 אנגליה", "🇬🇷 יוון",
  "🇦🇹 אוסטריה", "🇳🇱 הולנד", "🇩🇪 גרמניה", "🇹🇿 טנזניה",
  "🇲🇪 מונטנגרו", "🇸🇰 סלובקיה", "🇺🇸 ארה״ב", "🇪🇸 ספרד",
  "🇨🇿 צ׳כיה", "🇦🇪 אמירויות"
];

// Map category name → country label (must match COUNTRIES list)
const CATEGORY_COUNTRY = {
  "ישראל": "🇮🇱 ישראל",
  "איטליה": "🇮🇹 איטליה",
  "אנגליה": "🇬🇧 אנגליה",
  "יוון": "🇬🇷 יוון",
  "וינה": "🇦🇹 אוסטריה",
  "הולנד": "🇳🇱 הולנד",
  "גרמניה": "🇩🇪 גרמניה",
  "טנזניה": "🇹🇿 טנזניה",
  "מונטנגרו": "🇲🇪 מונטנגרו",
  "סלובקיה": "🇸🇰 סלובקיה",
  "סן דיאגו": "🇺🇸 ארה״ב",
  "ספרד ואנדורה": "🇪🇸 ספרד",
  "צכיה": "🇨🇿 צ׳כיה",
  "אבו דאבי": "🇦🇪 אמירויות",
};

let questions    = [];  // [{photo, correctCountry, options:[...4 countries]}]
let current      = 0;
let score        = 0;
let results      = [];  // true/false per question
let answered     = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOptions(correct) {
  const others = shuffle(COUNTRIES.filter(c => c !== correct)).slice(0, 3);
  return shuffle([correct, ...others]);
}

async function loadQuestions() {
  try {
    const resp = await fetch(`/api/quiz-photos?v=${Date.now()}`);
    if (!resp.ok) throw new Error('API error');
    const photos = await resp.json();
    const eligible = photos;
    if (eligible.length < QUESTIONS) {
      document.getElementById('error-msg').textContent =
        `לא מספיק תמונות לקוויז (${eligible.length} מתוך ${QUESTIONS} נדרשות).`;
      document.getElementById('error-msg').style.display = '';
      document.getElementById('loading').style.display = 'none';
      return false;
    }
    const weekPhoto = eligible.find(p => p.is_week_photo);
    const pool = weekPhoto ? eligible.filter(p => !p.is_week_photo) : eligible;
    const rest = shuffle(pool).slice(0, weekPhoto ? QUESTIONS - 1 : QUESTIONS);
    const selected = shuffle(weekPhoto ? [weekPhoto, ...rest] : rest);
    questions = selected.map(photo => {
      const correctCountry = CATEGORY_COUNTRY[photo.category] || photo.category;
      return { photo, correctCountry, options: buildOptions(correctCountry) };
    });
    return true;
  } catch(e) {
    document.getElementById('error-msg').style.display = '';
    document.getElementById('loading').style.display = 'none';
    return false;
  }
}

function renderQuestion() {
  const q = questions[current];
  answered = false;

  // Progress
  document.getElementById('progress-text').textContent = `${current + 1} / ${QUESTIONS}`;
  document.getElementById('progress-fill').style.width = `${(current / QUESTIONS) * 100}%`;
  document.getElementById('score-badge').textContent = `✓ ${score} נכון`;

  // Photo
  const img = document.getElementById('question-img');
  img.src = q.photo.thumbnail || q.photo.url;
  img.alt = '';

  // Hide desc + feedback + next btn
  document.getElementById('photo-desc').style.display = 'none';
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  // Render answer buttons
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  q.options.forEach(country => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = country;
    btn.onclick = () => handleAnswer(country, btn);
    answersEl.appendChild(btn);
  });
}

function handleAnswer(chosen, clickedBtn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = chosen === q.correctCountry;

  if (isCorrect) {
    score++;
    results.push(true);
    clickedBtn.classList.add('correct');
    document.getElementById('feedback').textContent = '✅ נכון! ניחשת יפה';
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').style.display = '';
  } else {
    results.push(false);
    clickedBtn.classList.add('wrong');
    // highlight correct
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.textContent === q.correctCountry) b.classList.add('correct');
    });
    document.getElementById('feedback').textContent = `❌ טעות — התשובה הנכונה: ${q.correctCountry}`;
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').style.display = '';
  }

  // Disable all buttons
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  // Show description
  if (q.photo.quiz_description) {
    const descEl = document.getElementById('photo-desc');
    // First sentence is bolded (up to first em-dash or comma or end)
    const desc = q.photo.quiz_description;
    const dashIdx = desc.indexOf(' — ');
    if (dashIdx > -1) {
      descEl.innerHTML = `<strong>${desc.slice(0, dashIdx)}</strong>${desc.slice(dashIdx)}`;
    } else {
      descEl.textContent = desc;
    }
    descEl.style.display = '';
  }

  document.getElementById('next-btn').style.display = '';
  document.getElementById('score-badge').textContent = `✓ ${score} נכון`;
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  const resultScreen = document.getElementById('result-screen');
  resultScreen.style.display = 'block';

  const won = score >= WIN_SCORE;

  // Last question's photo as result image
  const lastPhoto = questions[QUESTIONS - 1].photo;
  document.getElementById('result-img').src = lastPhoto.thumbnail || lastPhoto.url;

  document.getElementById('result-trophy').textContent = won ? '🏆' : '📸';
  document.getElementById('result-title').textContent  = won ? 'כל הכבוד!' : 'כמעט!';
  document.getElementById('result-sub').textContent    = `ענית נכון על ${score} מתוך ${QUESTIONS} שאלות`;

  // Score dots
  const dotContainer = document.getElementById('win-score');
  dotContainer.innerHTML = '';
  results.forEach(r => {
    const d = document.createElement('div');
    d.className = `win-dot ${r ? 'ok' : 'bad'}`;
    d.textContent = r ? '✓' : '✗';
    dotContainer.appendChild(d);
  });

  if (won) {
    const discountKey = 'quiz_discount_used';
    const lastWin = parseInt(localStorage.getItem(discountKey) || '0');
    const hoursSince = (Date.now() - lastWin) / 3600000;
    const discountActive = hoursSince >= 24;
    if (discountActive) localStorage.setItem(discountKey, Date.now());

    document.getElementById('discount-box').style.display = discountActive ? '' : 'none';
    document.getElementById('btn-gallery').style.display = '';
    document.getElementById('btn-gallery').href = discountActive
      ? `${SITE_URL}/?discount=quiz`
      : SITE_URL;
    document.getElementById('btn-gallery').textContent = discountActive
      ? '🛍️ לגלריה עם ההנחה'
      : '🛍️ לגלריה';
    const waText = encodeURIComponent(`ניצחתי במשחק "מאיפה הצילום?" של עמית! קיבלתי 20% הנחה 🎁 — ${QUIZ_URL}`);
    document.getElementById('btn-share').href = `https://wa.me/?text=${waText}`;
  } else {
    document.getElementById('discount-box').style.display = 'none';
    document.getElementById('btn-gallery').style.display = 'none';
    document.getElementById('result-badge').textContent = '🌍 סיבוב הושלם';
  }

  document.getElementById('btn-retry').onclick = startGame;
}

async function startGame() {
  // Reset state
  current = 0; score = 0; results = []; answered = false;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('loading').style.display = '';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';

  const ok = await loadQuestions();
  if (!ok) return;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('game-screen').style.display = '';
  renderQuestion();
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);

startGame();
</script>
</body>
</html>
