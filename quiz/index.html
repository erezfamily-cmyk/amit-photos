<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מאיפה הצילום? — Amit Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
<script src="/assets/js/nav.js?v=9aff906" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #222;
  --accent: #c8a96e;
  --green: #34d399;
  --red: #ef4444;
  --text: #fff;
  --muted: #888;
}
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
}
.game-card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  padding-bottom: 0.5rem;
}

/* Progress bar */
.progress-bar {
  background: #151515;
  padding: 0.6rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid #1f1f1f;
}
.progress-track { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; }
.progress-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.progress-text  { color: var(--muted); font-size: 0.72rem; white-space: nowrap; transition: color 0.2s; }
.score-badge    { color: var(--accent); font-size: 0.72rem; font-weight: 700; white-space: nowrap; transition: transform 0.2s, color 0.2s; display: inline-block; }
.score-badge.bump { transform: scale(1.15); }

/* Timer */
.timer-track { height: 3px; background: #1e1e1e; }
.timer-fill  { height: 100%; width: 100%; background: var(--green); transition: width 1s linear, background 0.5s; }
.timer-fill.warn   { background: #f59e0b; }
.timer-fill.danger { background: var(--red); }
.timer-num { font-size: 0.72rem; font-weight: 700; color: var(--green); white-space: nowrap; min-width: 1.4rem; text-align: center; transition: color 0.3s; }
.timer-num.warn    { color: #f59e0b; }
.timer-num.danger  { color: var(--red); }

/* Photo */
.photo-area {
  position: relative;
  height: 210px;
  background: #1a1208;
  overflow: hidden;
}
.photo-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.88; display: block; animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: scale(1.02); } to { opacity: 0.88; transform: scale(1); } }
.photo-overlay  { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 45%, var(--surface) 100%); }
.question-label {
  position: absolute;
  top: 10px; inset-inline-end: 10px;
  background: rgba(0,0,0,0.65);
  border: 1px solid #333;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.7rem;
  color: #aaa;
}

/* Photo description (shown after answer) */
.photo-desc {
  padding: 0.6rem 1rem;
  background: #141414;
  border-bottom: 1px solid #1e1e1e;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
  display: none;
}
.photo-desc strong { color: var(--accent); }

/* Answer buttons */
.answers {
  padding: 0.75rem 0.9rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.45rem;
}
.answer-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 0.6rem 0.5rem;
  text-align: start;
  cursor: pointer;
  font-size: 0.82rem;
  color: #ccc;
  font-family: 'Heebo', sans-serif;
  transition: border-color 0.1s, background 0.1s, transform 0.15s;
  animation: slideUp 0.35s ease-out backwards;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.answer-btn:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
.answer-btn.correct { background: rgba(52,211,153,0.12); border-color: var(--green); color: var(--green); }
.answer-btn.wrong   { background: rgba(239,68,68,0.1);  border-color: var(--red);   color: var(--red);   }
.answer-btn:disabled { cursor: default; }

/* Feedback */
.feedback {
  margin: 0 0.9rem 0.85rem;
  padding: 0.6rem 0.85rem;
  border-radius: 8px;
  font-size: 0.79rem;
  line-height: 1.5;
  display: none;
}
.feedback.correct { background: rgba(52,211,153,0.09); border: 1px solid rgba(52,211,153,0.28); color: #4ade80; display: block; margin-bottom: 0.5rem; }
.feedback.wrong   { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.22);  color: #f87171; display: block; margin-bottom: 0.5rem; }

/* Next button */
.next-btn {
  display: none;
  width: calc(100% - 1.8rem);
  margin: 0.5rem 0.9rem 0.9rem;
  padding: 0.65rem;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 700;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  z-index: 10;
  position: relative;
  animation: fadeIn 0.3s ease-out;
  -webkit-appearance: none;
  appearance: none;
  min-height: 44px;
  pointer-events: auto;
  touch-action: manipulation;
  box-shadow: 0 4px 12px rgba(200,169,110,0.3);
}
.next-btn::after {
  content: ' →';
  margin-inline-end: 0.3rem;
}

/* ===== WIN / LOSE SCREEN ===== */
.result-screen { display: none; }
.win-photo {
  height: 170px; position: relative; overflow: hidden; background: #1a1208;
}
.win-photo img { width:100%;height:100%;object-fit:cover;opacity:0.75;display:block; }
.win-badge {
  position:absolute; top:10px; inset-inline-end:10px;
  background: var(--accent); color:#111;
  font-size:0.7rem; font-weight:700;
  padding:3px 10px; border-radius:20px;
}
.win-photo-overlay { position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--surface) 100%); }
.win-content { padding: 1rem 1rem 1.25rem; text-align: center; }
.win-trophy  { font-size: 2rem; margin-bottom: 0.3rem; }
.win-title   { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; }
.win-sub     { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.9rem; }
.win-score   { display:flex; justify-content:center; gap:0.6rem; margin-bottom:0.9rem; }
.win-dot {
  width:26px;height:26px; border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem; font-weight:700;
}
.win-dot.ok  { background:rgba(52,211,153,0.18); border:1.5px solid var(--green); color:var(--green); }
.win-dot.bad { background:rgba(239,68,68,0.12);  border:1.5px solid var(--red);   color:var(--red);   }
.discount-box {
  background: linear-gradient(135deg,rgba(200,169,110,0.13),rgba(200,169,110,0.04));
  border: 1px solid rgba(200,169,110,0.3);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
  margin-bottom: 0.85rem;
  font-size: 0.83rem;
  color: var(--accent);
  line-height: 1.65;
  text-align: start;
}
.discount-box strong { font-size: 0.95rem; }
.result-btn {
  display: block; width: 100%;
  padding: 0.65rem; border-radius: 8px;
  font-size: 0.86rem; font-weight: 600;
  font-family: 'Heebo', sans-serif;
  border: none; cursor: pointer;
  margin-bottom: 0.45rem;
  text-align: center; text-decoration: none;
}
.btn-gold  { background: var(--accent); color: #111; }
.btn-whatsapp { background: #25D366; color: #fff; }
.btn-facebook { background: #1877f2; color: #fff; }
.btn-facebook:hover { background: #1465d4; }
#btn-share-fb { display: none; }
.btn-dark  { background: #1a1a1a; border: 1px solid #2a2a2a; color: var(--muted); }

/* Loading / error */
#loading, #error-msg {
  padding: 3rem 1rem;
  text-align: center;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="game-card" id="game-card">
  <div id="loading" data-he="טוען תמונות..." data-en="Loading photos...">טוען תמונות...</div>
  <div id="error-msg" style="display:none">
    <span data-he="לא הצלחנו לטעון תמונות." data-en="Failed to load photos.">לא הצלחנו לטעון תמונות.</span>
    <a href="https://amitphotos.com" style="color:var(--accent)" data-he="חזרה לגלריה" data-en="Back to gallery">חזרה לגלריה</a>
  </div>

  <!-- Game screen -->
  <div id="game-screen" style="display:none">
    <div class="progress-bar">
      <span class="score-badge" id="score-badge">✓ 0 נכון</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-text" id="progress-text">1 / 10</span>
      <span class="timer-num" id="timer-num">15</span>
    </div>
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>

    <div class="photo-area">
      <img id="question-img" src="" alt="">
      <div class="photo-overlay"></div>
      <div class="question-label" data-he="🌍 מאיפה הצילום?" data-en="🌍 Where Was It Taken?">🌍 מאיפה הצילום?</div>
    </div>

    <div class="photo-desc" id="photo-desc"></div>

    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" data-he="הבא" data-en="Next">הבא</button>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="result-screen">
    <div class="win-photo">
      <img id="result-img" src="" alt="">
      <div class="win-badge" id="result-badge">🌍 סיבוב הושלם!</div>
      <div class="win-photo-overlay"></div>
    </div>
    <div class="win-content">
      <div class="win-trophy" id="result-trophy">🏆</div>
      <div class="win-title" id="result-title">כל הכבוד!</div>
      <div class="win-sub" id="result-sub"></div>
      <div class="win-score" id="win-score"></div>
      <a class="result-btn btn-gold" id="btn-gallery" href="https://amitphotos.com/?discount=quiz"
         data-he="🛍️ לגלריה עם ההנחה" data-en="🛍️ To Gallery with Discount">🛍️ לגלריה עם ההנחה</a>
      <a class="result-btn btn-whatsapp" id="btn-share" href="#" target="_blank"
         data-he="💬 שתף בוואטסאפ" data-en="💬 Share on WhatsApp">💬 שתף בוואטסאפ</a>
      <a class="result-btn btn-facebook" id="btn-share-fb" href="#" target="_blank"
         data-he="📘 שתף בפייסבוק" data-en="📘 Share on Facebook">📘 שתף בפייסבוק</a>
      <button class="result-btn btn-dark" id="btn-retry"
              data-he="🔄 סיבוב חדש" data-en="🔄 New Round">🔄 סיבוב חדש</button>
    </div>
  </div>
</div>

<script>
const SITE_URL   = 'https://amitphotos.com';
const QUIZ_URL   = `${SITE_URL}/quiz/`;
const QUESTIONS  = 10;
const WIN_SCORE  = 6;

// i18n
let _lang = localStorage.getItem('lang') || 'he';

const COUNTRY_EN = {
  "🇮🇱 ישראל": "🇮🇱 Israel",
  "🇮🇹 איטליה": "🇮🇹 Italy",
  "🇬🇧 אנגליה": "🇬🇧 England",
  "🇬🇷 יוון": "🇬🇷 Greece",
  "🇦🇹 אוסטריה": "🇦🇹 Austria",
  "🇳🇱 הולנד": "🇳🇱 Netherlands",
  "🇩🇪 גרמניה": "🇩🇪 Germany",
  "🇹🇿 טנזניה": "🇹🇿 Tanzania",
  "🇲🇪 מונטנגרו": "🇲🇪 Montenegro",
  "🇸🇰 סלובקיה": "🇸🇰 Slovakia",
  "🇺🇸 ארה״ב": "🇺🇸 USA",
  "🇪🇸 ספרד": "🇪🇸 Spain",
  "🇨🇿 צ׳כיה": "🇨🇿 Czechia",
  "🇦🇪 אמירויות": "🇦🇪 UAE"
};

function locCountry(heLabel) {
  return _lang === 'en' ? (COUNTRY_EN[heLabel] || heLabel) : heLabel;
}

const T = {
  he: {
    scoreCorrect: n => `✓ ${n} נכון`,
    feedbackCorrect: '✅ נכון! ניחשת יפה',
    feedbackWrong: c => `❌ טעות — התשובה הנכונה: ${c}`,
    feedbackTimeUp: c => `⏱ נגמר הזמן — התשובה: ${c}`,
    resultBadgeWin: '🌍 סיבוב הושלם!',
    resultBadgeLoss: '🌍 סיבוב הושלם',
    resultTitleWin: 'כל הכבוד!',
    resultTitleLoss: 'כמעט!',
    resultSub: (s, t) => `ענית נכון על ${s} מתוך ${t} שאלות`,
    shareText: url => `ניצחתי במשחק "מאיפה הצילום?" של עמית! 🎉 — ${url}`
  },
  en: {
    scoreCorrect: n => `✓ ${n} correct`,
    feedbackCorrect: '✅ Correct! Well guessed',
    feedbackWrong: c => `❌ Wrong — The correct answer: ${c}`,
    feedbackTimeUp: c => `⏱ Time's up — The answer: ${c}`,
    resultBadgeWin: '🌍 Round complete!',
    resultBadgeLoss: '🌍 Round complete',
    resultTitleWin: 'Well done!',
    resultTitleLoss: 'Almost!',
    resultSub: (s, t) => `You answered ${s} out of ${t} correctly`,
    shareText: url => `I won the "Where Was It Taken?" game by Amit! 🎉 — ${url}`
  }
};

function tt() { return T[_lang] || T.he; }

function applyTranslations() {
  document.documentElement.lang = _lang;
  document.documentElement.dir = _lang === 'en' ? 'ltr' : 'rtl';
  document.querySelectorAll('[data-he]').forEach(el => {
    el.textContent = _lang === 'en' ? (el.dataset.en || el.dataset.he) : el.dataset.he;
  });
}

function setLang(lang) {
  _lang = lang;
  applyTranslations();
  const badge = document.getElementById('score-badge');
  if (badge) badge.textContent = tt().scoreCorrect(score);
}

window.setLang = setLang;

window.addEventListener('storage', e => {
  if (e.key === 'lang') setLang(e.newValue || 'he');
});

const COUNTRIES = [
  "🇮🇱 ישראל", "🇮🇹 איטליה", "🇬🇧 אנגליה", "🇬🇷 יוון",
  "🇦🇹 אוסטריה", "🇳🇱 הולנד", "🇩🇪 גרמניה", "🇹🇿 טנזניה",
  "🇲🇪 מונטנגרו", "🇸🇰 סלובקיה", "🇺🇸 ארה״ב", "🇪🇸 ספרד",
  "🇨🇿 צ׳כיה", "🇦🇪 אמירויות"
];

// Map category name → HE country label (must match COUNTRIES list)
const CATEGORY_COUNTRY = {
  "ישראל": "🇮🇱 ישראל",
  "איטליה": "🇮🇹 איטליה",
  "אנגליה": "🇬🇧 אנגליה",
  "יוון": "🇬🇷 יוון",
  "וינה": "🇦🇹 אוסטריה",
  "הולנד": "🇳🇱 הולנד",
  "גרמניה": "🇩🇪 גרמניה",
  "טנזניה": "🇹🇿 טנזניה",
  "מונטנגרו": "🇲🇪 מונטנגרו",
  "סלובקיה": "🇸🇰 סלובקיה",
  "סן דיאגו": "🇺🇸 ארה״ב",
  "ספרד ואנדורה": "🇪🇸 ספרד",
  "צכיה": "🇨🇿 צ׳כיה",
  "אבו דאבי": "🇦🇪 אמירויות",
};

let questions    = [];  // [{photo, correctCountry (HE), options:[...4 HE countries]}]
let current      = 0;
let score        = 0;
let results      = [];  // true/false per question
let answered     = false;

const TIMER_SECONDS = 15;
let timerInterval = null;
let timeLeft = TIMER_SECONDS;

function startTimer() {
  clearTimer();
  timeLeft = TIMER_SECONDS;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearTimer(); timeUp(); }
  }, 1000);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerUI() {
  const fill = document.getElementById('timer-fill');
  const num  = document.getElementById('timer-num');
  if (!fill || !num) return;
  fill.style.width = (timeLeft / TIMER_SECONDS * 100) + '%';
  num.textContent  = timeLeft;
  const danger = timeLeft <= 4;
  const warn   = timeLeft <= 8 && !danger;
  fill.className = 'timer-fill' + (danger ? ' danger' : warn ? ' warn' : '');
  num.className  = 'timer-num'  + (danger ? ' danger' : warn ? ' warn' : '');
}

function timeUp() {
  if (answered) return;
  answered = true;
  results.push(false);
  const correctLabel = locCountry(questions[current].correctCountry);
  document.querySelectorAll('.answer-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctLabel) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  fb.textContent = tt().feedbackTimeUp(correctLabel);
  fb.className = 'feedback wrong';
  fb.style.display = 'block';
  const q = questions[current];
  if (q.photo.quiz_description) {
    const descEl = document.getElementById('photo-desc');
    const desc = q.photo.quiz_description;
    const dashIdx = desc.indexOf(' — ');
    descEl.innerHTML = dashIdx > -1
      ? `<strong>${desc.slice(0, dashIdx)}</strong>${desc.slice(dashIdx)}`
      : desc;
    descEl.style.display = 'block';
  }
  document.getElementById('score-badge').textContent = tt().scoreCorrect(score);
  setTimeout(nextQuestion, 2000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOptions(correctHe) {
  const others = shuffle(COUNTRIES.filter(c => c !== correctHe)).slice(0, 3);
  return shuffle([correctHe, ...others]);
}

async function loadQuestions() {
  try {
    const resp = await fetch(`/api/quiz-photos?v=${Date.now()}`);
    if (!resp.ok) throw new Error('API error');
    const photos = await resp.json();
    const eligible = photos;
    if (eligible.length < QUESTIONS) {
      document.getElementById('error-msg').querySelector('[data-he]').dataset.he =
        `לא מספיק תמונות לקוויז (${eligible.length} מתוך ${QUESTIONS} נדרשות).`;
      document.getElementById('error-msg').querySelector('[data-he]').textContent =
        `לא מספיק תמונות לקוויז (${eligible.length} מתוך ${QUESTIONS} נדרשות).`;
      document.getElementById('error-msg').style.display = '';
      document.getElementById('loading').style.display = 'none';
      return false;
    }
    const weekPhoto = eligible.find(p => p.is_week_photo);
    const pool = weekPhoto ? eligible.filter(p => !p.is_week_photo) : eligible;
    const rest = shuffle(pool).slice(0, weekPhoto ? QUESTIONS - 1 : QUESTIONS);
    const selected = shuffle(weekPhoto ? [weekPhoto, ...rest] : rest);
    questions = selected.map(photo => {
      const correctCountry = CATEGORY_COUNTRY[photo.category] || photo.category;
      return { photo, correctCountry, options: buildOptions(correctCountry) };
    });
    return true;
  } catch(e) {
    document.getElementById('error-msg').style.display = '';
    document.getElementById('loading').style.display = 'none';
    return false;
  }
}

function renderQuestion() {
  const q = questions[current];
  answered = false;

  // Progress
  document.getElementById('progress-text').textContent = `${current + 1} / ${QUESTIONS}`;
  document.getElementById('progress-fill').style.width = `${(current / QUESTIONS) * 100}%`;
  document.getElementById('score-badge').textContent = tt().scoreCorrect(score);

  // Photo
  const img = document.getElementById('question-img');
  img.src = photoUrl(q.photo);
  img.alt = '';

  // Hide desc + feedback + next btn
  document.getElementById('photo-desc').style.display = 'none';
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  // Render answer buttons (localized)
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  q.options.forEach((countryHe, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.style.animationDelay = `${i * 0.08}s`;
    btn.textContent = locCountry(countryHe);
    btn.onclick = () => handleAnswer(countryHe, btn);
    answersEl.appendChild(btn);
  });

  startTimer();
  preloadNext();
}

function photoUrl(photo) {
  const base = photo.thumbnail || photo.url;
  return base + (base.includes('?') ? '&' : '?') + 'w=600';
}

function preloadNext() {
  const next = questions[current + 1];
  if (!next) return;
  const img = new Image();
  img.src = photoUrl(next.photo);
}

function handleAnswer(chosenHe, clickedBtn) {
  if (answered) return;
  answered = true;
  clearTimer();
  const q = questions[current];
  const isCorrect = chosenHe === q.correctCountry;
  const correctLabel = locCountry(q.correctCountry);

  if (isCorrect) {
    score++;
    results.push(true);
    clickedBtn.classList.add('correct');
    const badge = document.getElementById('score-badge');
    badge.classList.add('bump');
    setTimeout(() => badge.classList.remove('bump'), 200);
    document.getElementById('feedback').textContent = tt().feedbackCorrect;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').style.display = 'block';
  } else {
    results.push(false);
    clickedBtn.classList.add('wrong');
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.textContent === correctLabel) b.classList.add('correct');
    });
    document.getElementById('feedback').textContent = tt().feedbackWrong(correctLabel);
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').style.display = 'block';
  }

  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  if (q.photo.quiz_description) {
    const descEl = document.getElementById('photo-desc');
    const desc = q.photo.quiz_description;
    const dashIdx = desc.indexOf(' — ');
    descEl.innerHTML = dashIdx > -1
      ? `<strong>${desc.slice(0, dashIdx)}</strong>${desc.slice(dashIdx)}`
      : desc;
    descEl.style.display = 'block';
  }

  document.getElementById('score-badge').textContent = tt().scoreCorrect(score);

  if (isCorrect) {
    document.getElementById('next-btn').style.display = 'block';
  } else {
    setTimeout(nextQuestion, 2000);
  }
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  clearTimer();
  document.getElementById('game-screen').style.display = 'none';
  const resultScreen = document.getElementById('result-screen');
  resultScreen.style.display = 'block';

  const won = score >= WIN_SCORE;

  const lastPhoto = questions[QUESTIONS - 1].photo;
  document.getElementById('result-img').src = lastPhoto.thumbnail || lastPhoto.url;

  document.getElementById('result-trophy').textContent = won ? '🏆' : '📸';
  document.getElementById('result-title').textContent  = won ? tt().resultTitleWin : tt().resultTitleLoss;
  document.getElementById('result-sub').textContent    = tt().resultSub(score, QUESTIONS);
  document.getElementById('result-badge').textContent  = won ? tt().resultBadgeWin : tt().resultBadgeLoss;

  const dotContainer = document.getElementById('win-score');
  dotContainer.innerHTML = '';
  results.forEach(r => {
    const d = document.createElement('div');
    d.className = `win-dot ${r ? 'ok' : 'bad'}`;
    d.textContent = r ? '✓' : '✗';
    dotContainer.appendChild(d);
  });

  if (won) {
    document.getElementById('btn-gallery').style.display = '';
    const waText = encodeURIComponent(tt().shareText(QUIZ_URL));
    document.getElementById('btn-share').href = `https://wa.me/?text=${waText}`;
    document.getElementById('btn-share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(QUIZ_URL)}`;
    document.getElementById('btn-share-fb').style.display = '';
  } else {
    document.getElementById('btn-gallery').style.display = 'none';
    document.getElementById('btn-share-fb').style.display = 'none';
  }

  // Re-apply translations to static result buttons
  applyTranslations();
  document.getElementById('btn-retry').onclick = startGame;
}

async function startGame() {
  current = 0; score = 0; results = []; answered = false;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('loading').style.display = '';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';

  applyTranslations();

  const ok = await loadQuestions();
  if (!ok) return;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('game-screen').style.display = '';
  renderQuestion();
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);

startGame();
</script>
