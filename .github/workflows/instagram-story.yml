name: Instagram Story אוטומטי

on:
  # כל יום 08:00 UTC = 11:00 ישראל
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  instagram-story:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: התקנת חבילות
        run: pip install requests

      - name: פרסום Story Slideshow
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          PYTHONUNBUFFERED: "1"
        run: python src/instagram_story.py

      - name: שמירת היסטוריה
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram_story_posted.json
          git diff --cached --quiet || git commit -m "🤖 עדכון instagram_story_posted.json"
          git pull --rebase origin main
          git push
