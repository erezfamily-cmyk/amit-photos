name: דוח שבועי סושיאל מדיה

on:
  # כל ראשון ב-06:00 UTC = 09:00 ישראל
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests anthropic

      - name: שליחת דוח שבועי
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
          REPORT_EMAIL: erez.family@gmail.com
        run: python src/weekly_report.py

      - name: Commit דוח JSON
        run: |
          git config user.name "Weekly Report Agent"
          git config user.email "agent@amitphotos.com"
          git add data/social_report.json
          git diff --staged --quiet || (git commit -m "📊 עדכון דוח שבועי סושיאל מדיה" && git pull --rebase origin main && git push origin main)
