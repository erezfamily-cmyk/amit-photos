name: YouTube Weekly Slideshow

on:
  # כל ראשון 09:00 UTC = 12:00 ישראל
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  youtube-post:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: התקנת חבילות
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib

      - name: יצירת וידאו ופרסום ל-YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PYTHONUNBUFFERED: "1"
        run: python src/youtube_video.py

      - name: שמירת היסטוריה
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_posted.json || true
          git diff --cached --quiet || git commit -m "🤖 עדכון youtube_posted.json"
          git pull --rebase origin main
          git push
