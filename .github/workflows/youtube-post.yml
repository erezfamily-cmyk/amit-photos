name: YouTube Weekly Slideshow

on:
  # כל ראשון 09:00 UTC = 12:00 ישראל
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      replace_id:
        description: 'YouTube Video ID למחיקה לפני העלאה מחדש (למשל: 7t2JC2LCL84)'
        required: false
        default: ''

jobs:
  youtube-post:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: התקנת חבילות
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib Pillow

      - name: הורדת מוזיקה קלאסית (public domain)
        run: python src/download_classical.py

      - name: יצירת וידאו ופרסום ל-YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          REPLACE="${{ github.event.inputs.replace_id }}"
          if [ -n "$REPLACE" ]; then
            python src/youtube_video.py --replace "$REPLACE"
          else
            python src/youtube_video.py
          fi

      - name: שמירת היסטוריה
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_posted.json || true
          git diff --cached --quiet || git commit -m "🤖 עדכון youtube_posted.json"
          git pull --rebase origin main
          git push
