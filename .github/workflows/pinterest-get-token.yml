name: Pinterest — קבלת Access Token

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Authorization code מה-URL'
        required: true

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: החלף code ב-token ושמור כ-secret
        env:
          APP_ID: "1562228"
          APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinterest.com/v5/oauth/token" \
            -u "$APP_ID:$APP_SECRET" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=authorization_code&code=${{ github.event.inputs.code }}&redirect_uri=https://localhost")

          echo "תגובה מ-Pinterest: $RESPONSE"

          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          REFRESH=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('refresh_token',''))")

          if [ -z "$TOKEN" ]; then
            echo "❌ לא התקבל טוקן"
            exit 1
          fi

          echo "✅ טוקן התקבל!"

          # שמור כ-GitHub secret
          gh secret set PINTEREST_ACCESS_TOKEN --body "$TOKEN" --repo erezfamily-cmyk/amit-photos
          echo "✅ PINTEREST_ACCESS_TOKEN עודכן"

          if [ -n "$REFRESH" ]; then
            gh secret set PINTEREST_REFRESH_TOKEN --body "$REFRESH" --repo erezfamily-cmyk/amit-photos
            echo "✅ PINTEREST_REFRESH_TOKEN עודכן"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
