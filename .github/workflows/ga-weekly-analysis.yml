name: ניתוח GA שבועי עם Claude

on:
  # כל שני ב-07:00 UTC = 10:00 ישראל
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ga-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests anthropic

      - name: ניתוח GA שבועי
        env:
          GA4_PROPERTY_ID:  ${{ secrets.GA4_PROPERTY_ID }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
          GA_CLIENT_ID:     ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
          REPORT_EMAIL:     erez.family@gmail.com
          FROM_EMAIL:       "Amit Photos <amit@amitphotos.com>"
        run: python src/ga_weekly_report.py

      - name: שמירת דוח ל-git
        run: |
          git config user.name "GA Report Agent"
          git config user.email "agent@amitphotos.com"
          git add data/ga_reports.json
          git diff --staged --quiet || (git commit -m "📊 דוח GA שבועי $(date +%d.%m.%Y)" && git pull --rebase origin main && git push origin main)
