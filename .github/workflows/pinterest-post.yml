name: פרסום ל-Pinterest אוטומטי

on:
  # כל יום ב-07:00 UTC = 10:00 ישראל
  schedule:
    - cron: '0 7 * * *'
  # הפעלה ידנית
  workflow_dispatch:

jobs:
  pinterest-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests

      - name: פרסום ל-Pinterest
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: python src/pinterest_post.py

      - name: Commit ו-push אם יש שינויים
        run: |
          git config user.name "Pinterest Agent"
          git config user.email "agent@amitphotos.com"
          git add data/pinterest_posted.json
          git diff --staged --quiet || (git commit -m "🤖 עדכון Pinterest: תמונות שפורסמו" && git pull --rebase origin main && git push origin main)
