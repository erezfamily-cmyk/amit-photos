name: פרסום ל-Pinterest אוטומטי

on:
  # כל יום ב-14:00 UTC = 17:00 ישראל
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  pinterest-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests anthropic

      - name: פרסום ל-Pinterest
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
        run: |
          for attempt in 1 2 3; do
            python src/pinterest_post.py && break
            if [ $attempt -lt 3 ]; then
              echo "ניסיון $attempt נכשל — ממתין 60 שניות..."
              sleep 60
            else
              echo "כל הניסיונות נכשלו"
              exit 1
            fi
          done

      - name: Commit ו-push אם יש שינויים
        run: |
          git config user.name "Pinterest Agent"
          git config user.email "agent@amitphotos.com"
          git add data/pinterest_posted.json
          git diff --staged --quiet || (git commit -m "🤖 עדכון Pinterest: תמונות שפורסמו" && git pull --rebase origin main && git push origin main)
