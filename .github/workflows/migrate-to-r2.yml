name: מיגרציה מ-Drive ל-R2

on:
  workflow_dispatch:  # הפעלה ידנית בלבד

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests

      - name: הרצת מיגרציה
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          WORKER_URL: https://amitphotos.com
        run: python src/migrate_to_r2.py
