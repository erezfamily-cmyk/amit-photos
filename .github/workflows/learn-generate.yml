name: ניתוח צילום חדש — ניתוח תמונות

on:
  schedule:
    - cron: '0 10 */2 * *'  # כל יומיים 10:00 UTC
  workflow_dispatch:

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests pillow

      - name: ייצור ניתוח ופרסום
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_PASSWORD }}
        run: python src/learn_social_post.py
