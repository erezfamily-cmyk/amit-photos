name: עדכון תמונות אוטומטי

on:
  # כל יום ב-06:00 (UTC) = 09:00 ישראל
  schedule:
    - cron: '0 6 * * *'
  # הפעלה ידנית מה-GitHub Actions tab
  workflow_dispatch:

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 anthropic Pillow

      - name: הרצת Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            python src/agent_photos.py && break
            if [ $attempt -lt 3 ]; then
              echo "ניסיון $attempt נכשל — ממתין 60 שניות..."
              sleep 60
            else
              echo "כל הניסיונות נכשלו"
              exit 1
            fi
          done

      - name: עדכן GOOGLE_TOKEN אחרי רענון
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f token_refreshed.json ] && [ -n "$GH_TOKEN" ]; then
            gh secret set GOOGLE_TOKEN < token_refreshed.json
            echo "✅ GOOGLE_TOKEN עודכן"
            rm token_refreshed.json
          fi

      - name: עדכון Sitemap
        run: python src/generate_sitemap.py

      - name: עדכון גרסאות assets
        run: python scripts/bump_versions.py

      - name: בדוק אם יש שינויים
        id: changes
        run: |
          git diff --quiet data/photos.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit ו-push אם יש תמונות חדשות
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Photos Agent"
          git config user.email "agent@amitphotos.com"
          git add data/photos.json sitemap.xml
          git commit -m "🤖 עדכון אוטומטי: תמונות חדשות מ-Google Drive"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Deploy ל-Cloudflare
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf .git node_modules
          npx wrangler deploy

      - name: Cloudflare cache purge
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | python3 -c "import sys,json; r=json.load(sys.stdin); print('cache purged' if r.get('success') else f'purge failed: {r}')"

      - name: DB migrations (idempotent)
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          curl -s -X POST https://amitphotos.com/api/admin/migrate-photo-dimensions \
            -H "X-Admin-Password: ${ADMIN_PASSWORD}" | python3 -c "import sys,json; r=json.load(sys.stdin); print('DB migration:', r)"

      - name: מיגרציה תמונות חדשות ל-R2
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          WORKER_URL: https://amitphotos.com
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN }}
        run: python src/migrate_to_r2.py
