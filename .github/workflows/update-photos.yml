name: עדכון תמונות אוטומטי

on:
  # כל יום ב-06:00 (UTC) = 09:00 ישראל
  schedule:
    - cron: '0 6 * * *'
  # הפעלה ידנית מה-GitHub Actions tab
  workflow_dispatch:

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 anthropic Pillow

      - name: הרצת Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN }}
        run: python src/agent_photos.py

      - name: בדוק אם יש שינויים
        id: changes
        run: |
          git diff --quiet data/photos.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit ו-push אם יש תמונות חדשות
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Photos Agent"
          git config user.email "agent@amit-photos.netlify.app"
          git add data/photos.json
          git commit -m "🤖 עדכון אוטומטי: תמונות חדשות מ-Google Drive"
          git push
