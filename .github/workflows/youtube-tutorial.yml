name: YouTube Tutorial — Camera Guide to Video

on:
  # כל רביעי 10:00 UTC = 13:00 ישראל (נפרד מה-slideshow של ראשון)
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:
    inputs:
      guide:
        description: 'שם המדריך (למשל: depth-of-field) — ריק = הבא בתור'
        required: false
        default: ''
      replace_id:
        description: 'YouTube Video ID למחיקה לפני העלאה (למשל: j2VtQzl2_k4)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  youtube-tutorial:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      - name: התקנת חבילות
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib

      - name: יצירת סרטון הדרכה ופרסום ל-YouTube
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          GUIDE="${{ github.event.inputs.guide }}"
          REPLACE="${{ github.event.inputs.replace_id }}"
          ARGS=""
          [ -n "$GUIDE" ] && ARGS="$GUIDE"
          [ -n "$REPLACE" ] && ARGS="$ARGS --replace $REPLACE"
          python src/youtube_tutorial.py $ARGS

      - name: שמירת היסטוריה
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_tutorials_posted.json || true
          git diff --cached --quiet || git commit -m "🤖 עדכון youtube_tutorials_posted.json"
          git pull --rebase origin main
          git push
