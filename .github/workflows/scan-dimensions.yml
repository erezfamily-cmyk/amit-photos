name: סריקת ממדי תמונות

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests pillow

      - name: סריקת ממדים
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_PASSWORD }}
        run: python src/scan_dimensions.py
