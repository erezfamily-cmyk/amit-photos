name: פרסום לפייסבוק אוטומטי

on:
  # שלישי וחמישי ב-16:00 UTC = 19:00 ישראל (שעות שיא, לא בימים כמו אינסטגרם)
  schedule:
    - cron: '0 16 * * 2,4'
  workflow_dispatch:

jobs:
  facebook-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests anthropic

      - name: פרסום תמונה לפייסבוק
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
        run: |
          for attempt in 1 2 3; do
            python src/facebook_post.py && break
            if [ $attempt -lt 3 ]; then
              echo "ניסיון $attempt נכשל — ממתין 60 שניות..."
              sleep 60
            else
              echo "כל הניסיונות נכשלו"
              exit 1
            fi
          done

      - name: עדכון מעקב פרסומים
        run: |
          git config user.name "Facebook Agent"
          git config user.email "agent@amitphotos.com"
          git add data/facebook_posted.json
          git diff --staged --quiet || (git commit -m "🤖 עדכון facebook_posted.json" && git pull --rebase origin main && git push origin main)
