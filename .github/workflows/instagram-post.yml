name: פרסום לאינסטגרם אוטומטי

on:
  # ראשון, רביעי ושישי ב-09:00 UTC = 12:00 ישראל
  schedule:
    - cron: '0 9 * * 0,3,5'
  workflow_dispatch:

jobs:
  instagram-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת חבילות
        run: pip install requests anthropic

      - name: פרסום תמונה לאינסטגרם
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.AMIT_PHOTO_AGENT }}
        run: python src/instagram_post.py

      - name: עדכון מעקב פרסומים
        run: |
          git config user.name "Instagram Agent"
          git config user.email "agent@amitphotos.com"
          git add data/instagram_posted.json
          git diff --staged --quiet || (git commit -m "🤖 עדכון instagram_posted.json" && git pull --rebase origin main && git push origin main)
